name: Despertador (manter o servidor acordado)

# Cutuca o app no Render a cada 10 min pra ele nao "dormir" (cold start do plano free).
# Solucao temporaria/gratis ate ligar o Render Starter no lancamento.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Cutucar o servidor
        run: |
          echo "Ping em $(date -u)"
          curl -sS -m 40 -o /dev/null -w "HTTP %{http_code} em %{time_total}s\n" \
            https://claude-code-febra.onrender.com/ \
            || echo "ping falhou (o servidor pode estar acordando)"
