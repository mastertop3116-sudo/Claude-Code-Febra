<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --p: {{cor_primaria}};
    --a: {{cor_acento}};
    --bg: #FDFAF3;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @page { size: A4 landscape; margin: 0; }

  html { width: 297mm; height: 210mm; }

  body {
    width: 297mm;
    height: 210mm;
    background: var(--bg);
    overflow: hidden;
    position: relative;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── BACKGROUND PATTERN ── */
  .bg-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(45deg, var(--a) 0, var(--a) 1px, transparent 0, transparent 50%);
    background-size: 28px 28px;
  }

  /* ── OUTER BORDER ── */
  .border-outer {
    position: absolute;
    inset: 10px;
    border: 5px solid var(--p);
  }

  .border-inner {
    position: absolute;
    inset: 18px;
    border: 1px solid var(--a);
  }

  .border-inner2 {
    position: absolute;
    inset: 22px;
    border: 0.5px solid var(--p);
    opacity: 0.4;
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 44px;
    height: 44px;
  }
  .corner.tl { top: 8px; left: 8px; }
  .corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .corner.br { bottom: 8px; right: 8px; transform: scale(-1); }

  .corner svg { width: 44px; height: 44px; }

  /* Midpoint diamonds on sides */
  .mid-diamond {
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--a);
    transform: rotate(45deg);
  }
  .mid-t { top: 5px; left: 50%; margin-left: -7px; }
  .mid-b { bottom: 5px; left: 50%; margin-left: -7px; }
  .mid-l { left: 5px; top: 50%; margin-top: -7px; }
  .mid-r { right: 5px; top: 50%; margin-top: -7px; }

  /* Dots along border */
  .border-dots-h, .border-dots-v {
    position: absolute;
    display: flex;
    gap: 0;
  }
  .border-dots-h { flex-direction: row; height: 4px; }
  .border-dots-h.top { top: 13px; left: 60px; right: 60px; }
  .border-dots-h.bot { bottom: 13px; left: 60px; right: 60px; }
  .border-dots-v { flex-direction: column; width: 4px; }
  .border-dots-v.lft { left: 13px; top: 60px; bottom: 60px; }
  .border-dots-v.rgt { right: 13px; top: 60px; bottom: 60px; }

  .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--a); flex-shrink: 0; }
  .border-dots-h .dot { margin: 0 9.5px; }
  .border-dots-v .dot { margin: 9.5px 0; }

  /* ── SEAL ── */
  .seal-wrap {
    position: absolute;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .seal {
    position: relative;
    width: 88px;
    height: 88px;
  }

  .seal svg { width: 88px; height: 88px; }

  /* ── CONTENT ── */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 60px 24px;
    text-align: center;
  }

  .seal-spacer { height: 92px; flex-shrink: 0; }

  .label-top {
    font-family: 'Montserrat', sans-serif;
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--p);
    margin-top: 6px;
    margin-bottom: 4px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 360px;
    margin: 4px auto;
  }

  .div-line { flex: 1; height: 1px; background: var(--a); }
  .div-diamond { width: 8px; height: 8px; background: var(--a); transform: rotate(45deg); flex-shrink: 0; }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--p);
    line-height: 1.1;
    margin: 6px 0 4px;
    letter-spacing: -0.5px;
  }

  .concedido {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: #9E9E9E;
    letter-spacing: 1px;
    margin: 4px 0 2px;
  }

  .name-line-wrap {
    position: relative;
    width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 2px 0;
  }

  .name-line-row {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 10px;
  }

  .name-line-side { width: 8px; height: 8px; background: var(--a); transform: rotate(45deg); flex-shrink: 0; }
  .name-line-bar { flex: 1; height: 1.5px; background: var(--p); }

  .name-text {
    font-family: 'Great Vibes', cursive;
    font-size: 34px;
    color: var(--p);
    line-height: 1.2;
    margin-top: 2px;
  }

  .name-accent-line {
    width: 280px;
    height: 0.5px;
    background: var(--a);
    margin-top: 1px;
  }

  .body-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: #424242;
    line-height: 1.5;
    max-width: 460px;
    margin: 6px 0;
    font-weight: 500;
  }

  .tag {
    background: var(--a);
    color: #212121;
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 5px 22px;
    border-radius: 20px;
    margin: 6px 0 10px;
    text-transform: uppercase;
  }

  /* ── SIGNATURES ── */
  .signatures {
    display: flex;
    gap: 32px;
    margin-top: 2px;
    align-items: flex-end;
  }

  .sig-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 130px;
  }

  .sig-line { width: 130px; height: 1px; background: var(--p); }
  .sig-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 7.5px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #9E9E9E;
  }

  /* ── FOOTER ── */
  .footer {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 7px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #BDBDBD;
  }

  /* Stars row */
  .stars {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 6px 0 4px;
  }

  .star {
    width: 10px;
    height: 10px;
    position: relative;
  }

  .star::before, .star::after {
    content: '';
    position: absolute;
    background: var(--a);
  }

  .star::before { width: 10px; height: 3px; top: 3.5px; left: 0; }
  .star::after  { width: 3px; height: 10px; top: 0; left: 3.5px; }
</style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="border-outer"></div>
<div class="border-inner"></div>
<div class="border-inner2"></div>

<!-- Corner ornaments -->
<div class="corner tl">
  <svg viewBox="0 0 44 44"><rect x="0" y="0" width="44" height="44" fill="{{cor_primaria}}"/><rect x="3" y="3" width="38" height="38" fill="{{cor_acento}}"/><rect x="7" y="7" width="30" height="30" fill="{{cor_primaria}}"/><circle cx="22" cy="22" r="5" fill="{{cor_acento}}"/></svg>
</div>
<div class="corner tr">
  <svg viewBox="0 0 44 44"><rect x="0" y="0" width="44" height="44" fill="{{cor_primaria}}"/><rect x="3" y="3" width="38" height="38" fill="{{cor_acento}}"/><rect x="7" y="7" width="30" height="30" fill="{{cor_primaria}}"/><circle cx="22" cy="22" r="5" fill="{{cor_acento}}"/></svg>
</div>
<div class="corner bl">
  <svg viewBox="0 0 44 44"><rect x="0" y="0" width="44" height="44" fill="{{cor_primaria}}"/><rect x="3" y="3" width="38" height="38" fill="{{cor_acento}}"/><rect x="7" y="7" width="30" height="30" fill="{{cor_primaria}}"/><circle cx="22" cy="22" r="5" fill="{{cor_acento}}"/></svg>
</div>
<div class="corner br">
  <svg viewBox="0 0 44 44"><rect x="0" y="0" width="44" height="44" fill="{{cor_primaria}}"/><rect x="3" y="3" width="38" height="38" fill="{{cor_acento}}"/><rect x="7" y="7" width="30" height="30" fill="{{cor_primaria}}"/><circle cx="22" cy="22" r="5" fill="{{cor_acento}}"/></svg>
</div>

<!-- Mid diamonds -->
<div class="mid-diamond mid-t"></div>
<div class="mid-diamond mid-b"></div>
<div class="mid-diamond mid-l"></div>
<div class="mid-diamond mid-r"></div>

<!-- Border dots -->
<div class="border-dots-h top"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<div class="border-dots-h bot"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

<!-- Seal -->
<div class="seal-wrap">
  <div class="seal">
    <svg viewBox="0 0 88 88">
      <!-- Glow ring -->
      <circle cx="44" cy="44" r="43" fill="{{cor_acento}}" opacity="0.15"/>
      <!-- Outer accent ring -->
      <circle cx="44" cy="44" r="41" fill="{{cor_acento}}"/>
      <!-- White gap -->
      <circle cx="44" cy="44" r="38" fill="#FDFAF3"/>
      <!-- Primary ring -->
      <circle cx="44" cy="44" r="36" fill="{{cor_primaria}}"/>
      <!-- Sunburst rays -->
      <g stroke="{{cor_acento}}" stroke-width="1.2" opacity="0.9">
        <line x1="44" y1="18" x2="44" y2="28"/><line x1="44" y1="60" x2="44" y2="70"/>
        <line x1="18" y1="44" x2="28" y2="44"/><line x1="60" y1="44" x2="70" y2="44"/>
        <line x1="25.5" y1="25.5" x2="32.6" y2="32.6"/><line x1="55.4" y1="55.4" x2="62.5" y2="62.5"/>
        <line x1="62.5" y1="25.5" x2="55.4" y2="32.6"/><line x1="32.6" y1="55.4" x2="25.5" y2="62.5"/>
        <line x1="20.5" y1="34.5" x2="29.5" y2="37.5"/><line x1="58.5" y1="50.5" x2="67.5" y2="53.5"/>
        <line x1="34.5" y1="20.5" x2="37.5" y2="29.5"/><line x1="50.5" y1="58.5" x2="53.5" y2="67.5"/>
        <line x1="67.5" y1="34.5" x2="58.5" y2="37.5"/><line x1="29.5" y1="50.5" x2="20.5" y2="53.5"/>
        <line x1="53.5" y1="20.5" x2="50.5" y2="29.5"/><line x1="37.5" y1="58.5" x2="34.5" y2="67.5"/>
      </g>
      <!-- Inner filled circle -->
      <circle cx="44" cy="44" r="24" fill="{{cor_primaria}}"/>
      <!-- Dotted ring -->
      <circle cx="44" cy="10" r="2" fill="{{cor_acento}}"/>
      <circle cx="66.4" cy="17.6" r="2" fill="{{cor_acento}}"/>
      <circle cx="78" cy="44" r="2" fill="{{cor_acento}}"/>
      <circle cx="66.4" cy="70.4" r="2" fill="{{cor_acento}}"/>
      <circle cx="44" cy="78" r="2" fill="{{cor_acento}}"/>
      <circle cx="21.6" cy="70.4" r="2" fill="{{cor_acento}}"/>
      <circle cx="10" cy="44" r="2" fill="{{cor_acento}}"/>
      <circle cx="21.6" cy="17.6" r="2" fill="{{cor_acento}}"/>
      <!-- Abbreviation -->
      <text x="44" y="50" text-anchor="middle" fill="white" font-family="Montserrat,sans-serif" font-weight="700" font-size="18" letter-spacing="1">{{abbr}}</text>
    </svg>
  </div>
</div>

<!-- Main content -->
<div class="content">
  <div class="seal-spacer"></div>

  <div class="label-top">{{subtitulo}}</div>

  <div class="divider">
    <div class="div-line"></div>
    <div class="div-diamond"></div>
    <div class="div-line"></div>
  </div>

  <div class="title">{{titulo}}</div>

  <div class="concedido">Concedido a</div>

  <div class="name-line-wrap">
    <div class="name-line-row">
      <div class="name-line-side"></div>
      <div class="name-line-bar"></div>
      <div class="name-line-side"></div>
    </div>
    <div class="name-text">{{nome_aluno}}</div>
    <div class="name-accent-line"></div>
  </div>

  <div class="body-text">{{texto_corpo}}</div>

  <div class="tag">{{tag}}</div>

  <div class="signatures">
    <div class="sig-item">
      <div class="sig-line"></div>
      <div class="sig-label">{{label_ass1}}</div>
    </div>
    <div class="sig-item">
      <div class="sig-line"></div>
      <div class="sig-label">{{label_ass2}}</div>
    </div>
    <div class="sig-item">
      <div class="sig-line"></div>
      <div class="sig-label">{{label_ass3}}</div>
    </div>
  </div>
</div>

<div class="footer">{{rodape}}</div>

</body>
</html>
