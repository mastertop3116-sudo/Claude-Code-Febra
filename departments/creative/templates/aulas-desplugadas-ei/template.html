<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Nunito', 'Noto Color Emoji', sans-serif;
    width: 794px; min-height: 1123px;
    background: #fff;
    padding: 32px 36px;
    display: flex; flex-direction: column;
  }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cor);
    border-radius: 18px;
    padding: 16px 24px;
    margin-bottom: 20px;
    color: white;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .header-icon { font-size: 40px; line-height:1; }
  .header-title { font-size: 28px; font-weight: 900; line-height:1.1; }
  .header-faixa {
    font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,0.3);
    border-radius: 20px; padding: 4px 12px;
    white-space: nowrap;
  }

  /* INSTRUCAO */
  .instrucao-box {
    background: #FFF9EC;
    border: 2.5px solid #FFD93D;
    border-radius: 14px;
    padding: 12px 18px;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 12px;
  }
  .instrucao-icon { font-size: 26px; }
  .instrucao-text { font-size: 16px; font-weight: 700; color: #333; line-height: 1.4; }

  /* CONTEUDO */
  .conteudo { flex: 1; }

  /* GALERIA EMOJI */
  .galeria {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 20px; margin-top: 8px;
  }
  .galeria-item {
    border: 3px solid var(--cor);
    border-radius: 16px;
    padding: 20px 12px;
    text-align: center;
    background: #fafafa;
  }
  .galeria-item .emoji { font-size: 56px; line-height:1.2; }
  .galeria-item .nome {
    font-size: 16px; font-weight: 800; color: #333;
    margin-top: 8px;
  }
  .galeria-item .linha-nome {
    border-bottom: 2.5px dashed var(--cor);
    margin-top: 12px; height: 24px;
  }

  /* CONTAGEM */
  .contagem-grid {
    display: flex; flex-direction: column; gap: 16px;
  }
  .contagem-linha {
    display: flex; align-items: center; gap: 16px;
    background: #fafafa; border-radius: 14px;
    padding: 14px 18px; border: 2.5px solid #eee;
  }
  .contagem-emojis { font-size: 28px; flex:1; letter-spacing: 4px; }
  .contagem-box {
    width: 56px; height: 56px;
    border: 3px solid var(--cor);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 900; color: var(--cor);
    background: white;
  }

  /* VOGAIS */
  .vogais-grid {
    display: flex; flex-direction: column; gap: 14px;
  }
  .vogal-linha {
    display: flex; align-items: center; gap: 16px;
    background: #fafafa; border-radius: 14px;
    padding: 12px 16px; border: 2.5px solid #eee;
  }
  .vogal-letra {
    font-size: 48px; font-weight: 900; color: var(--cor);
    width: 56px; text-align: center; line-height: 1;
  }
  .vogal-trace {
    font-size: 36px; color: #ddd;
    font-weight: 900; width: 48px; text-align: center;
    border-bottom: 2px dashed var(--cor); padding-bottom: 4px;
  }
  .vogal-emoji { font-size: 36px; }
  .vogal-palavra { font-size: 18px; font-weight: 700; color: #555; flex:1; }

  /* SILABAS */
  .silabas-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .silaba-item {
    background: #fafafa; border-radius: 14px;
    padding: 14px 16px; border: 2.5px solid #eee;
    display: flex; align-items: center; gap: 12px;
  }
  .silaba-emoji { font-size: 36px; }
  .silaba-info { flex:1; }
  .silaba-palavra { font-size: 18px; font-weight: 800; color: #333; }
  .silaba-resposta {
    font-size: 15px; font-weight: 600; color: #aaa;
    border-bottom: 2px dashed var(--cor); margin-top: 6px;
    padding-bottom: 4px; min-height: 24px;
  }

  /* ADICAO / SUBTRACAO */
  .contas-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .conta-card {
    background: #fafafa; border-radius: 14px;
    padding: 16px; border: 2.5px solid #eee;
    text-align: center;
  }
  .conta-emojis { font-size: 22px; margin-bottom: 8px; letter-spacing: 3px; }
  .conta-expressao {
    font-size: 28px; font-weight: 900; color: #333;
    margin-bottom: 8px;
  }
  .conta-resultado {
    border-bottom: 3px solid var(--cor);
    display: inline-block; min-width: 48px; height: 36px;
  }

  /* ANTES-DEPOIS */
  .antes-depois-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .ad-card {
    background: #fafafa; border-radius: 14px;
    padding: 14px; border: 2.5px solid #eee;
    display: flex; align-items: center; gap: 8px; justify-content: center;
  }
  .ad-box {
    width: 48px; height: 48px;
    border: 2.5px solid var(--cor); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #aaa;
  }
  .ad-numero {
    font-size: 32px; font-weight: 900; color: var(--cor);
    padding: 0 8px;
  }

  /* SEQUENCIA NUMERICA */
  .seq-grid { display: flex; flex-direction: column; gap: 14px; }
  .seq-linha {
    display: flex; gap: 8px; align-items: center;
    background: #fafafa; border-radius: 12px;
    padding: 12px 16px; border: 2px solid #eee;
  }
  .seq-num {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 900;
  }
  .seq-num.dado { background: var(--cor); color: white; }
  .seq-num.vazio { border: 2.5px dashed var(--cor); color: transparent; }

  /* RIMAS */
  .rimas-container {
    display: flex; gap: 40px; justify-content: center; margin-top: 16px;
  }
  .rimas-col { display: flex; flex-direction: column; gap: 16px; }
  .rima-item {
    background: #fafafa; border: 2.5px solid var(--cor);
    border-radius: 14px; padding: 14px 24px;
    font-size: 22px; font-weight: 800; color: #333;
    text-align: center; min-width: 140px;
  }

  /* COMPARAR NUMEROS */
  .comparar-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .comparar-card {
    background: #fafafa; border-radius: 14px;
    padding: 14px; border: 2.5px solid #eee;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .comp-num {
    font-size: 32px; font-weight: 900; color: var(--cor);
  }
  .comp-sinal {
    width: 48px; height: 48px;
    border: 2.5px dashed #ccc; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #bbb;
  }

  /* COMPLETAR SILABA */
  .comp-sil-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .comp-sil-item {
    background: #fafafa; border-radius: 14px;
    padding: 14px; border: 2.5px solid #eee;
    display: flex; align-items: center; gap: 12px;
  }
  .comp-sil-emoji { font-size: 36px; }
  .comp-sil-palavra {
    font-size: 22px; font-weight: 900; color: #333; letter-spacing: 2px;
  }
  .comp-sil-box {
    display: inline-block;
    border-bottom: 3px solid var(--cor);
    min-width: 32px; text-align: center;
    font-size: 22px; color: transparent;
  }

  /* ASSOCIAR */
  .associar-container {
    display: flex; gap: 60px; justify-content: center;
    align-items: flex-start; margin-top: 16px;
  }
  .associar-col { display: flex; flex-direction: column; gap: 16px; }
  .assoc-item {
    background: #fafafa; border: 2.5px solid var(--cor);
    border-radius: 14px; padding: 14px 20px;
    font-size: 24px; text-align: center;
    display: flex; align-items: center; gap: 8px;
    min-width: 140px; justify-content: center;
  }
  .assoc-item .cat { font-size: 15px; font-weight: 800; color: #555; }

  /* GRANDE PEQUENO */
  .gp-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .gp-card {
    background: #fafafa; border-radius: 14px;
    padding: 14px; border: 2.5px solid #eee;
    display: flex; align-items: center; justify-content: space-around;
  }
  .gp-item { text-align: center; }
  .gp-emoji-big { font-size: 56px; }
  .gp-emoji-small { font-size: 32px; }
  .gp-nome { font-size: 13px; font-weight: 700; color: #777; margin-top: 4px; }

  /* IGUAL DIFERENTE */
  .ig-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .ig-card {
    background: #fafafa; border-radius: 14px;
    padding: 14px; border: 2.5px solid #eee;
    display: flex; align-items: center; justify-content: space-around;
  }
  .ig-emoji { font-size: 44px; }
  .ig-box {
    width: 44px; height: 44px;
    border: 2.5px dashed #ccc; border-radius: 10px;
  }

  /* CIRCULE CORRETO */
  .circule-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  }
  .circule-item {
    background: #fafafa; border-radius: 14px;
    padding: 14px 8px; border: 2.5px solid #eee;
    text-align: center;
  }
  .circule-emoji { font-size: 40px; }
  .circule-nome { font-size: 12px; font-weight: 700; color: #666; margin-top: 6px; }

  /* ESCREVER PALAVRA */
  .escrever-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .escrever-item {
    background: #fafafa; border-radius: 14px;
    padding: 14px 16px; border: 2.5px solid #eee;
    display: flex; align-items: center; gap: 12px;
  }
  .escrever-emoji { font-size: 40px; }
  .escrever-linhas { flex:1; }
  .escrever-linha {
    border-bottom: 2.5px solid var(--cor);
    height: 32px; margin-top: 8px;
  }

  /* LABIRINTO */
  .labirinto-container { text-align: center; margin-top: 8px; }
  .labirinto-pista { margin-bottom: 12px; font-size: 15px; font-weight: 700; color: #666; }
  .maze {
    display: inline-grid;
    border: 4px solid var(--cor);
    border-radius: 12px; overflow: hidden;
  }
  .mc { width: 44px; height: 44px; border: 1px solid #ddd; }
  .mc.wall { background: var(--cor); opacity: 0.85; }
  .mc.path { background: white; }
  .mc.start { background: #C8F7C5; }
  .mc.end { background: #FFC3A0; }
  .mc.emoji-cell {
    display:flex; align-items:center; justify-content:center;
    font-size: 24px; background: white;
  }

  /* HORAS */
  .horas-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 16px;
  }
  .hora-card {
    background: #fafafa; border-radius: 14px;
    padding: 16px; border: 2.5px solid #eee; text-align: center;
  }
  .relogio {
    width: 80px; height: 80px; border-radius: 50%;
    border: 4px solid var(--cor);
    margin: 0 auto 10px; position: relative;
    background: white;
  }
  .hora-linha {
    border-bottom: 2.5px solid var(--cor);
    margin-top: 10px; height: 28px;
  }

  /* PARTES CORPO */
  .corpo-container { display: flex; gap: 24px; align-items: flex-start; }
  .corpo-figura { font-size: 140px; line-height:1; flex-shrink:0; }
  .corpo-lista { flex:1; display: flex; flex-direction: column; gap: 12px; }
  .corpo-item {
    display: flex; align-items: center; gap: 8px;
    background: #fafafa; border-radius: 10px;
    padding: 8px 14px; border: 2px solid #eee;
  }
  .corpo-seta { font-size: 18px; }
  .corpo-linha { flex:1; border-bottom: 2.5px dashed var(--cor); height: 24px; }

  /* ALFABETO */
  .alfa-grid {
    display: grid; grid-template-columns: repeat(6,1fr); gap: 8px;
  }
  .alfa-card {
    border: 2.5px solid var(--cor); border-radius: 10px;
    padding: 8px 4px; text-align: center;
  }
  .alfa-letra { font-size: 26px; font-weight: 900; color: var(--cor); }
  .alfa-trace { font-size: 18px; color: #ddd; font-weight: 900; }
  .alfa-linha { border-bottom: 2px dashed #ccc; margin-top: 6px; height: 20px; }

  /* FOOTER */
  .footer {
    margin-top: 20px; padding-top: 12px;
    border-top: 2.5px dashed #eee;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-marca { font-size: 13px; font-weight: 800; color: #aaa; }
  .footer-faixa {
    font-size: 13px; font-weight: 700;
    background: var(--cor); color: white;
    border-radius: 20px; padding: 4px 14px;
  }
  .footer-nome { font-size: 12px; color: #ccc; }
  .nome-linha { border-bottom: 2px solid #ddd; display: inline-block; width: 160px; }

  /* CONTAS SIMPLES */
  .conta-linha {
    font-size: 22px; font-weight: 900;
    display: flex; align-items: center; gap: 8px;
    color: var(--cor);
  }
  .conta-igual { color: #333; }
  .conta-blank {
    border-bottom: 3px solid var(--cor);
    display: inline-block; min-width: 40px; height: 30px;
  }
</style>
</head>
<body style="--cor: COR_PLACEHOLDER">

<div class="header">
  <div class="header-left">
    <div class="header-icon">ICON_PLACEHOLDER</div>
    <div class="header-title">TITULO_PLACEHOLDER</div>
  </div>
  <div class="header-faixa">FAIXA_PLACEHOLDER · IDADE_PLACEHOLDER</div>
</div>

<div class="instrucao-box">
  <div class="instrucao-icon">👉</div>
  <div class="instrucao-text">INSTRUCAO_PLACEHOLDER</div>
</div>

<div class="conteudo">
CONTEUDO_PLACEHOLDER
</div>

<div class="footer">
  <div class="footer-marca">Aulas Desplugadas</div>
  <div>Nome: <span class="nome-linha"></span></div>
  <div class="footer-faixa">FAIXA_PLACEHOLDER</div>
</div>

</body>
</html>
