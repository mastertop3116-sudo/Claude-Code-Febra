<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
@page { size: A4; margin: 0; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  background: #fff;
  width: 210mm;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* ── PÁGINA ── */
.page {
  width: 210mm;
  min-height: 297mm;
  position: relative;
  overflow: hidden;
  page-break-after: always;
  page-break-inside: avoid;
  background: #fff;
}
.page:last-child { page-break-after: auto; }

/* ══════════════════════ CAPA ══════════════════════ */
.capa {
  width: 210mm;
  min-height: 297mm;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  background: var(--bg, #0f0e1f);
}

/* Fundo gradiente principal */
.capa-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    160deg,
    color-mix(in srgb, var(--p) 80%, #000) 0%,
    var(--bg, #0f0e1f) 45%,
    #000 100%
  );
}

/* Círculo decorativo grande */
.capa-circle-lg {
  position: absolute;
  top: -40mm; right: -30mm;
  width: 140mm; height: 140mm;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in srgb, var(--p) 40%, transparent) 0%, transparent 70%);
}

/* Linhas decorativas */
.capa-lines {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.06;
  background-image:
    repeating-linear-gradient(
      90deg,
      #fff 0px, #fff 0.3mm,
      transparent 0.3mm, transparent 28mm
    );
}

/* Mancha de luz no centro-baixo */
.capa-glow {
  position: absolute;
  bottom: 50mm; left: 50%;
  transform: translateX(-50%);
  width: 100mm; height: 60mm;
  background: radial-gradient(ellipse, color-mix(in srgb, var(--p) 25%, transparent) 0%, transparent 70%);
}

/* Conteúdo da capa */
.capa-content {
  position: relative;
  z-index: 10;
  padding: 0 16mm 16mm;
}

/* Badge do tipo */
.capa-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 40px;
  padding: 2.5mm 6mm;
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
  margin-bottom: 8mm;
}

/* Linha decorativa colorida acima do título */
.capa-line {
  width: 14mm;
  height: 1mm;
  background: var(--s, #818cf8);
  border-radius: 1mm;
  margin-bottom: 5mm;
}

.capa-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 34pt;
  font-weight: 800;
  color: #fff;
  line-height: 1.12;
  letter-spacing: -0.5px;
  margin-bottom: 5mm;
  text-shadow: 0 3mm 12mm rgba(0,0,0,0.5);
}

.capa-subtitulo {
  font-family: 'Inter', sans-serif;
  font-size: 11.5pt;
  font-weight: 300;
  color: rgba(255,255,255,0.70);
  line-height: 1.55;
  margin-bottom: 12mm;
  max-width: 160mm;
}

.capa-autor-row {
  display: flex;
  align-items: center;
  gap: 4mm;
}

.capa-autor-line {
  width: 6mm;
  height: 0.5mm;
  background: var(--s, #818cf8);
  border-radius: 1mm;
}

.capa-autor {
  font-family: 'Montserrat', sans-serif;
  font-size: 9pt;
  font-weight: 600;
  color: rgba(255,255,255,0.65);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ══════════════════════ PÁGINA DE CONTEÚDO ══════════════════════ */

/* Header da página */
.pg-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5mm 16mm 0;
  margin-bottom: 6mm;
}
.pg-header-titulo {
  font-family: 'Inter', sans-serif;
  font-size: 7pt;
  font-weight: 500;
  color: #bbb;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.pg-header-num {
  font-family: 'Inter', sans-serif;
  font-size: 7pt;
  color: #ccc;
}

/* Seção de título do capítulo/passo/módulo */
.sec-header {
  padding: 0 16mm 6mm;
  border-bottom: 0.4mm solid #f0f0f7;
  margin-bottom: 6mm;
  position: relative;
}
.sec-header::before {
  content: '';
  position: absolute;
  bottom: -0.4mm; left: 16mm;
  width: 12mm; height: 0.8mm;
  background: var(--p, #6366f1);
  border-radius: 1mm;
}

.sec-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  color: var(--p, #6366f1);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 2mm;
}
.sec-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 19pt;
  font-weight: 700;
  color: #141424;
  line-height: 1.25;
}
.sec-num-bg {
  position: absolute;
  right: 12mm; top: -4mm;
  font-family: 'Playfair Display', serif;
  font-size: 60pt;
  font-weight: 800;
  color: color-mix(in srgb, var(--p, #6366f1) 8%, #fff);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

/* Corpo do texto */
.pg-body {
  padding: 0 16mm 12mm;
}

.texto {
  font-family: 'Inter', sans-serif;
  font-size: 10pt;
  color: #2e2e3e;
  line-height: 1.88;
  text-align: justify;
  margin-bottom: 5mm;
}
.texto p { margin-bottom: 3mm; }

/* Pull quote */
.quote {
  margin: 5mm 0;
  padding: 5mm 7mm;
  border-left: 3mm solid var(--p, #6366f1);
  background: color-mix(in srgb, var(--p, #6366f1) 5%, #fff);
  border-radius: 0 2mm 2mm 0;
}
.quote-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 12pt;
  font-style: italic;
  color: var(--p, #6366f1);
  line-height: 1.6;
}

/* Pontos-chave */
.kp-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  color: var(--p, #6366f1);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin: 4mm 0 2.5mm;
}
.kp-list { list-style: none; }
.kp-list li {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt;
  color: #2e2e3e;
  padding: 1.5mm 0 1.5mm 5.5mm;
  line-height: 1.55;
  position: relative;
  border-bottom: 0.3mm solid #f4f4f8;
}
.kp-list li:last-child { border-bottom: none; }
.kp-list li::before {
  content: '';
  position: absolute;
  left: 0; top: 3.5mm;
  width: 2mm; height: 2mm;
  background: var(--s, #818cf8);
  border-radius: 50%;
}

/* Box de dica */
.tip {
  display: flex;
  gap: 3.5mm;
  margin: 4mm 0;
  padding: 4mm 5mm;
  background: color-mix(in srgb, var(--s, #818cf8) 7%, #fff);
  border: 0.5mm solid color-mix(in srgb, var(--s, #818cf8) 20%, #fff);
  border-radius: 2mm;
}
.tip-icon { font-size: 13pt; flex-shrink: 0; line-height: 1.3; }
.tip-text {
  font-family: 'Inter', sans-serif;
  font-size: 9pt;
  color: #3a3a4a;
  line-height: 1.65;
}

/* Ações (guia) */
.actions { list-style: none; margin: 3mm 0; }
.actions li {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt;
  color: #2e2e3e;
  padding: 2mm 0 2mm 6mm;
  position: relative;
  line-height: 1.5;
  border-bottom: 0.3mm solid #f4f4f8;
}
.actions li:last-child { border-bottom: none; }
.actions li::before {
  content: '→';
  position: absolute; left: 0;
  color: var(--p, #6366f1);
  font-weight: 600; font-size: 8.5pt;
}

/* Checklist */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 3mm;
  padding: 2.5mm 0;
  border-bottom: 0.3mm solid #f4f4f8;
}
.check-item:last-child { border-bottom: none; }
.check-box {
  width: 4.5mm; height: 4.5mm;
  border: 0.8mm solid var(--p, #6366f1);
  border-radius: 1mm;
  flex-shrink: 0;
  margin-top: 0.5mm;
}
.check-text {
  font-family: 'Inter', sans-serif;
  font-size: 10pt;
  color: #2e2e3e;
  line-height: 1.55;
}

/* Checklist: header de seção compacto */
.cl-sec-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3mm 5mm 3mm 5mm;
  background: color-mix(in srgb, var(--p, #6366f1) 7%, #fff);
  border-left: 3.5mm solid var(--p, #6366f1);
  border-radius: 0 2mm 2mm 0;
  margin-bottom: 3mm;
}
.cl-sec-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 10.5pt; font-weight: 700; color: #141424;
}
.cl-sec-count {
  font-family: 'Inter', sans-serif;
  font-size: 7.5pt; font-weight: 600; color: var(--p, #6366f1);
  background: color-mix(in srgb, var(--p, #6366f1) 12%, #fff);
  padding: 1mm 3mm; border-radius: 10mm; white-space: nowrap;
}
.cl-desc {
  font-family: 'Inter', sans-serif; font-size: 9pt; color: #7a7a9a;
  margin-bottom: 2mm; line-height: 1.5; font-style: italic;
}
.cl-section-wrap { margin-bottom: 5mm; }
.cl-section-wrap:last-child { margin-bottom: 0; }

/* Workbook: bloco de exercício */
.wb-ex-block {
  margin: 4mm 0;
  padding: 4mm 5mm;
  background: #fafafe;
  border: 0.5mm solid #eaeaf5;
  border-radius: 2mm;
  page-break-inside: avoid;
}
.wb-ex-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 9pt; font-weight: 700;
  color: var(--p, #6366f1); margin-bottom: 1.5mm;
  display: flex; align-items: center; gap: 2mm;
}
.wb-ex-title::before {
  content: '';
  display: inline-block; width: 2.5mm; height: 2.5mm;
  background: var(--p, #6366f1); border-radius: 50%; flex-shrink: 0;
}
.wb-ex-instrucao {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt; color: #3a3a4a; line-height: 1.65;
  margin-bottom: 3mm;
}
.wb-ex-label {
  font-family: 'Inter', sans-serif;
  font-size: 7.5pt; font-weight: 600; color: #aaa;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 1.5mm;
}

/* Linhas de exercício */
.ex-line {
  border-bottom: 0.5mm solid #e0e0ee;
  height: 7.5mm;
  margin-bottom: 1mm;
}

/* Versículo (devocional) */
.verse-box {
  margin: 3mm 0 5mm;
  padding: 5mm 7mm;
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--p, #6366f1) 6%, #fff),
    color-mix(in srgb, var(--s, #818cf8) 4%, #fff)
  );
  border-left: 3mm solid var(--p, #6366f1);
  border-radius: 0 2mm 2mm 0;
}
.verse-ref {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 2mm;
}
.verse-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 11pt; font-style: italic;
  color: #1a1a2e; line-height: 1.7;
}

/* Oração (devocional) */
.prayer-box {
  margin: 4mm 0;
  padding: 5mm 7mm;
  background: color-mix(in srgb, var(--p, #6366f1) 4%, #fafafe);
  border: 0.5mm solid color-mix(in srgb, var(--p, #6366f1) 15%, #fff);
  border-radius: 2mm;
}
.prayer-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 2.5mm;
}
.prayer-text {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt; font-style: italic;
  color: #3a3a4a; line-height: 1.85;
}

/* Dia (desafio) */
.day-card {
  padding: 3mm 4mm;
  border: 0.5mm solid #ebebf5;
  border-radius: 2mm;
  margin-bottom: 3mm;
  page-break-inside: avoid;
}
.day-num {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 1mm;
}
.day-title {
  font-family: 'Inter', sans-serif;
  font-size: 10pt; font-weight: 700;
  color: #141424; margin-bottom: 1.5mm;
}
.day-task {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt; color: #3a3a4a; line-height: 1.6;
}
.day-affirm {
  font-family: 'Inter', sans-serif;
  font-size: 8.5pt; font-style: italic;
  color: var(--p, #6366f1); margin-top: 1.5mm;
}

/* Planner campos */
.pl-section-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 10pt; font-weight: 700;
  color: #141424;
  border-bottom: 0.8mm solid var(--p, #6366f1);
  padding-bottom: 2mm; margin-bottom: 4mm;
}
.pl-campo {
  display: flex;
  align-items: flex-start;
  gap: 3mm; margin-bottom: 3.5mm;
}
.pl-campo-label {
  font-family: 'Inter', sans-serif;
  font-size: 9pt; color: #7a7a9a;
  min-width: 38mm; padding-top: 0.5mm;
}
.pl-campo-line {
  flex: 1;
  border-bottom: 0.5mm solid #ccc;
  min-height: 6mm;
}

/* VSL script */
.vsl-block { margin-bottom: 4.5mm; }
.vsl-header { display: flex; align-items: center; gap: 3mm; margin-bottom: 2.5mm; }
.vsl-badge {
  background: var(--p, #6366f1); color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700; letter-spacing: 1px;
  padding: 1.2mm 3mm; border-radius: 1mm;
}
.vsl-dur { font-family: 'Inter', sans-serif; font-size: 8pt; color: #999; }
.vsl-script {
  font-family: 'Inter', sans-serif;
  font-size: 10pt; color: #2e2e3e; line-height: 1.85;
  text-align: justify;
  background: #f9f9fc;
  padding: 3.5mm 5mm;
  border-radius: 1.5mm;
}

/* ══════════════════════ RODAPÉ ══════════════════════ */
.pg-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 10mm;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16mm;
  border-top: 0.3mm solid #eee;
}
.footer-left {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 600;
  color: #ccc; letter-spacing: 1px; text-transform: uppercase;
}
.footer-right {
  font-family: 'Inter', sans-serif;
  font-size: 7pt; color: #ccc;
}

/* ══════════════════════ INTRO PAGE ══════════════════════ */
.intro-page {
  padding: 14mm 16mm 14mm;
  display: flex;
  flex-direction: column;
}
.intro-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 3mm;
}
.intro-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 22pt; font-weight: 700;
  color: #141424; line-height: 1.2;
  margin-bottom: 6mm;
}
.intro-texto {
  font-family: 'Inter', sans-serif;
  font-size: 10pt; color: #3a3a4a;
  line-height: 1.88; text-align: justify;
}
.intro-texto p { margin-bottom: 3mm; }

/* ══════════════════════ CONTRACAPA ══════════════════════ */
.contracapa {
  width: 210mm;
  min-height: 297mm;
  background: #0a0a18;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16mm;
  position: relative;
}
.contracapa-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3mm;
  background: linear-gradient(90deg, var(--p, #6366f1), var(--s, #818cf8), #22d3a5);
}
.contracapa-circle {
  position: absolute;
  bottom: -30mm; right: -20mm;
  width: 100mm; height: 100mm;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in srgb, var(--p, #6366f1) 20%, transparent), transparent 70%);
}
.contracapa-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 22pt; font-weight: 700;
  color: #fff; text-align: center;
  margin-bottom: 5mm; line-height: 1.3;
  position: relative;
}
.contracapa-sub {
  font-family: 'Inter', sans-serif;
  font-size: 10.5pt; font-weight: 300;
  color: rgba(255,255,255,0.55);
  text-align: center; line-height: 1.7;
  max-width: 150mm; margin-bottom: 10mm;
  position: relative;
}
.contracapa-div {
  width: 18mm; height: 0.8mm;
  background: var(--p, #6366f1);
  margin: 0 auto 10mm;
  border-radius: 1mm;
  position: relative;
}
.contracapa-autor {
  font-family: 'Montserrat', sans-serif;
  font-size: 11pt; font-weight: 700;
  color: #fff; text-align: center;
  margin-bottom: 3mm;
  position: relative;
}
.contracapa-tipo {
  font-family: 'Inter', sans-serif;
  font-size: 9pt; color: rgba(255,255,255,0.35);
  text-align: center;
  position: relative;
}
.contracapa-copy {
  position: absolute;
  bottom: 7mm; left: 0; right: 0;
  font-family: 'Inter', sans-serif;
  font-size: 7.5pt; color: rgba(255,255,255,0.2);
  text-align: center;
}
</style>
</head>
<body>
<div id="doc"></div>

<script>
/* __CRIADOR_DATA__ */

(function(){
  const d = window.__D;
  if (!d) return;

  const P = d.cores.primaria;
  const S = d.cores.secundaria;
  const BG = d.cores.bg;

  document.documentElement.style.setProperty('--p', P);
  document.documentElement.style.setProperty('--s', S);
  document.documentElement.style.setProperty('--bg', BG);

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function paras(t){
    return String(t||'').split(/\n+/).filter(Boolean)
      .map(p=>`<p>${esc(p)}</p>`).join('');
  }

  let pgNum = 0;
  function footer(){
    pgNum++;
    return `<div class="pg-footer">
      <span class="footer-left">${esc(d.autor)}</span>
      <span class="footer-right">${pgNum}</span>
    </div>`;
  }
  function pgHeader(label){
    return `<div class="pg-header">
      <span class="pg-header-titulo">${esc(d.titulo||'')}</span>
      <span class="pg-header-num">${esc(label||'')}</span>
    </div>`;
  }

  let html = '';

  /* ═══════════════ CAPA ═══════════════ */
  html += `<div class="page">
    <div class="capa">
      <div class="capa-bg"></div>
      <div class="capa-circle-lg"></div>
      <div class="capa-lines"></div>
      <div class="capa-glow"></div>
      <div class="capa-content">
        <div class="capa-badge">${esc(d.label_tipo)}</div>
        <div class="capa-line"></div>
        <div class="capa-titulo">${esc(d.titulo||'')}</div>
        <div class="capa-subtitulo">${esc(d.subtitulo||d.nicho||'')}</div>
        <div class="capa-autor-row">
          <div class="capa-autor-line"></div>
          <div class="capa-autor">por ${esc(d.autor)} · ${d.ano}</div>
        </div>
      </div>
    </div>
  </div>`;

  /* ═══════════════ POR TIPO ═══════════════ */

  // ── EBOOK ──
  if (d.tipo === 'ebook') {
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Introdução')}
        <div class="intro-label">Introdução</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${footer()}
      </div>`;
    }
    (d.capitulos||[]).forEach((c,i)=>{
      html += `<div class="page">
        ${pgHeader('Capítulo '+(c.numero||i+1))}
        <div class="sec-header">
          <div class="sec-label">Capítulo ${c.numero||i+1}</div>
          <div class="sec-titulo">${esc(c.titulo||'')}</div>
          <div class="sec-num-bg">${String(c.numero||i+1).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          <div class="texto">${paras(c.conteudo||'')}</div>
          ${c.citacao?`<div class="quote"><div class="quote-text">"${esc(c.citacao)}"</div></div>`:''}
          ${(c.pontos_chave||[]).length?`
            <div class="kp-label">Pontos-chave</div>
            <ul class="kp-list">${(c.pontos_chave||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
          `:''}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.conclusao) {
      html += `<div class="page intro-page">
        ${pgHeader('Conclusão')}
        <div class="intro-label">Conclusão</div>
        <div class="intro-titulo">Próximos Passos</div>
        <div class="intro-texto">${paras(d.conclusao)}</div>
        ${d.cta?`<div class="tip" style="margin-top:7mm"><div class="tip-icon">🎯</div><div class="tip-text">${esc(d.cta)}</div></div>`:''}
        ${footer()}
      </div>`;
    }

  // ── WORKBOOK ──
  } else if (d.tipo === 'workbook') {
    // Intro + índice de módulos
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Como Usar')}
        <div class="intro-label">Como Usar Este Workbook</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${(d.modulos||[]).length ? `
          <div class="kp-label" style="margin-top:7mm;margin-bottom:3mm">Módulos deste Workbook</div>
          ${(d.modulos||[]).map((m,i)=>`
            <div style="display:flex;align-items:center;gap:3mm;padding:2.5mm 3mm;border-bottom:0.3mm solid #f0f0f7">
              <div style="width:6mm;height:6mm;border-radius:50%;background:var(--p);color:#fff;font-family:'Montserrat',sans-serif;font-size:7pt;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${m.numero||i+1}</div>
              <div style="font-family:'Inter',sans-serif;font-size:10pt;font-weight:600;color:#141424;flex:1">${esc(m.titulo||'')}</div>
              <div style="font-family:'Inter',sans-serif;font-size:8pt;color:#aaa">${(m.exercicios||[]).length} exerc.</div>
            </div>
          `).join('')}
        ` : ''}
        ${footer()}
      </div>`;
    }
    // Cada módulo: teoria numa página, exercícios na página seguinte
    (d.modulos||[]).forEach((m,i)=>{
      // Página de teoria
      html += `<div class="page">
        ${pgHeader('Módulo '+(m.numero||i+1))}
        <div class="sec-header">
          <div class="sec-label">Módulo ${m.numero||i+1}</div>
          <div class="sec-titulo">${esc(m.titulo||'')}</div>
          <div class="sec-num-bg">${String(m.numero||i+1).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          ${m.objetivo?`<div class="tip" style="margin-bottom:4mm"><div class="tip-icon">🎯</div><div class="tip-text"><strong>Ao final deste módulo você vai:</strong> ${esc(m.objetivo)}</div></div>`:''}
          ${m.teoria?`<div class="texto">${paras(m.teoria)}</div>`:''}
        </div>
        ${footer()}
      </div>`;
      // Página de exercícios
      if ((m.exercicios||[]).length) {
        html += `<div class="page">
          ${pgHeader('Módulo '+(m.numero||i+1)+' — Exercícios')}
          <div class="pg-body" style="padding-top:6mm">
            <div class="sec-label" style="margin-bottom:3mm">Módulo ${m.numero||i+1} · Pratique Agora</div>
            ${(m.exercicios||[]).map((ex,ei)=>`
              <div class="wb-ex-block">
                <div class="wb-ex-title">${esc(ex.titulo||`Exercício ${ei+1}`)}</div>
                <div class="wb-ex-instrucao">${esc(ex.instrucao||'')}</div>
                <div class="wb-ex-label">Minha Resposta</div>
                <div>${Array(ex.linhas||6).fill('<div class="ex-line"></div>').join('')}</div>
              </div>
            `).join('')}
          </div>
          ${footer()}
        </div>`;
      }
    });
    if (d.reflexao_final) {
      html += `<div class="page intro-page">
        ${pgHeader('Reflexão Final')}
        <div class="intro-label">Reflexão Final</div>
        <div class="intro-titulo">Meu Compromisso</div>
        <div class="intro-texto">${paras(d.reflexao_final)}</div>
        <div style="margin-top:8mm">
          <div class="wb-ex-label" style="margin-bottom:2mm">Meu Próximo Passo Concreto</div>
          ${Array(5).fill('<div class="ex-line"></div>').join('')}
        </div>
        ${footer()}
      </div>`;
    }

  // ── GUIA ──
  } else if (d.tipo === 'guia') {
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Introdução')}
        <div class="intro-label">Introdução</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${footer()}
      </div>`;
    }
    (d.passos||[]).forEach((p,i)=>{
      html += `<div class="page">
        ${pgHeader('Passo '+(p.numero||i+1))}
        <div class="sec-header">
          <div class="sec-label">Passo ${p.numero||i+1}</div>
          <div class="sec-titulo">${esc(p.titulo||'')}</div>
          <div class="sec-num-bg">${String(p.numero||i+1).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          <div class="texto">${paras(p.descricao||'')}</div>
          ${(p.acoes||[]).length?`
            <div class="kp-label">Ações Práticas</div>
            <ul class="actions">${(p.acoes||[]).map(a=>`<li>${esc(a)}</li>`).join('')}</ul>
          `:''}
          ${p.dica?`<div class="tip" style="margin-top:4mm"><div class="tip-icon">💡</div><div class="tip-text">${esc(p.dica)}</div></div>`:''}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.conclusao) {
      html += `<div class="page intro-page">
        ${pgHeader('Próximos Passos')}
        <div class="intro-label">Finalizando</div>
        <div class="intro-titulo">Você Está Pronto</div>
        <div class="intro-texto">${paras(d.conclusao)}</div>
        ${footer()}
      </div>`;
    }

  // ── CHECKLIST ──
  } else if (d.tipo === 'checklist') {
    // Intro page
    if (d.introducao) {
      const totalItens = (d.secoes||[]).reduce((s,sec)=>s+(sec.itens||[]).length, 0);
      html += `<div class="page intro-page">
        ${pgHeader('Sobre')}
        <div class="intro-label">Sobre Este Checklist</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        <div class="tip" style="margin-top:7mm">
          <div class="tip-icon">✅</div>
          <div class="tip-text">
            <strong>${(d.secoes||[]).length} seções</strong> · <strong>${totalItens} itens verificáveis</strong>
            ${d.subtitulo ? ` · ${esc(d.subtitulo)}` : ''}
          </div>
        </div>
        ${footer()}
      </div>`;
    }
    // Pack sections: group by density (≤14 itens por página)
    const grupos = [];
    let cur = [], curN = 0;
    (d.secoes||[]).forEach(sec=>{
      const n = (sec.itens||[]).length;
      if (curN + n > 14 && cur.length > 0) {
        grupos.push(cur); cur = [sec]; curN = n;
      } else {
        cur.push(sec); curN += n;
      }
    });
    if (cur.length) grupos.push(cur);

    grupos.forEach(grupo=>{
      html += `<div class="page">
        ${pgHeader('Checklist')}
        <div class="pg-body" style="padding-top:4mm">
          ${grupo.map(sec=>`
            <div class="cl-section-wrap">
              <div class="cl-sec-hdr">
                <div class="cl-sec-title">${esc(sec.titulo||'')}</div>
                <div class="cl-sec-count">${(sec.itens||[]).length} itens</div>
              </div>
              ${sec.descricao?`<div class="cl-desc">${esc(sec.descricao)}</div>`:''}
              ${(sec.itens||[]).map(item=>`
                <div class="check-item">
                  <div class="check-box"></div>
                  <div class="check-text">${esc(item)}</div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.dica_final) {
      html += `<div class="page intro-page">
        ${pgHeader('Dica Final')}
        <div class="intro-label">Dica Final</div>
        <div class="intro-titulo">Como Tirar o Máximo</div>
        <div class="intro-texto">${paras(d.dica_final)}</div>
        ${footer()}
      </div>`;
    }

  // ── DESAFIO ──
  } else if (d.tipo === 'desafio') {
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Aceite o Desafio')}
        <div class="intro-label">Aceite o Desafio</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${d.manifesto?`<div class="quote" style="margin-top:6mm"><div class="quote-text">${esc(d.manifesto)}</div></div>`:''}
        ${footer()}
      </div>`;
    }
    (d.semanas||[]).forEach(sem=>{
      html += `<div class="page">
        ${pgHeader('Semana '+sem.numero)}
        <div class="sec-header">
          <div class="sec-label">Semana ${sem.numero}</div>
          <div class="sec-titulo">${esc(sem.tema||'')}</div>
          <div class="sec-num-bg">${sem.numero}</div>
        </div>
        <div class="pg-body">
          ${sem.descricao?`<div class="texto" style="margin-bottom:4mm">${paras(sem.descricao)}</div>`:''}
          ${(sem.dias||[]).map(dia=>`
            <div class="day-card">
              <div class="day-num">Dia ${dia.numero}</div>
              <div class="day-title">${esc(dia.titulo||'')}</div>
              <div class="day-task">${esc(dia.tarefa||'')}</div>
              <div class="day-affirm">✨ ${esc(dia.afirmacao||'')}</div>
            </div>
          `).join('')}
        </div>
        ${footer()}
      </div>`;
    });

  // ── PLANNER ──
  } else if (d.tipo === 'planner') {
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Como Usar')}
        <div class="intro-label">Como Usar Este Planner</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${d.citacao?`<div class="quote" style="margin-top:6mm"><div class="quote-text">"${esc(d.citacao)}"</div></div>`:''}
        ${footer()}
      </div>`;
    }
    (d.secoes||[]).forEach(sec=>{
      html += `<div class="page intro-page" style="padding-top:12mm">
        ${pgHeader('Planner')}
        <div class="pl-section-title">${esc(sec.titulo||'')}</div>
        ${sec.descricao?`<div class="tip-text" style="margin-bottom:4mm;font-size:9.5pt;color:#5a5a6a">${esc(sec.descricao)}</div>`:''}
        ${(sec.campos||[]).map(c=>`<div class="pl-campo">
          <div class="pl-campo-label">${esc(c)}</div>
          <div class="pl-campo-line"></div>
        </div>`).join('')}
        ${Array(4).fill('<div class="pl-campo"><div class="pl-campo-label"></div><div class="pl-campo-line"></div></div>').join('')}
        ${footer()}
      </div>`;
    });
    if ((d.rituais||[]).length) {
      html += `<div class="page intro-page" style="padding-top:12mm">
        ${pgHeader('Rituais')}
        <div class="intro-label">Rituais de Alta Performance</div>
        <div class="intro-titulo">Rotinas que Transformam</div>
        ${(d.rituais||[]).map(r=>`
          <div style="margin-bottom:5mm;padding:4mm 6mm;background:color-mix(in srgb,var(--p) 4%,#fff);border-radius:2mm;border:0.5mm solid color-mix(in srgb,var(--p) 12%,#fff)">
            <div class="kp-label">${esc(r.tipo||r.titulo||'')}</div>
            <ul class="kp-list">${(r.passos||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
          </div>
        `).join('')}
        ${footer()}
      </div>`;
    }

  // ── DEVOCIONAL ──
  } else if (d.tipo === 'devocional') {
    if (d.prefacio) {
      html += `<div class="page intro-page">
        ${pgHeader('Prefácio')}
        <div class="intro-label">Prefácio</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.prefacio)}</div>
        ${footer()}
      </div>`;
    }
    (d.dias||[]).forEach(dia=>{
      html += `<div class="page">
        ${pgHeader('Dia '+dia.numero)}
        <div class="sec-header">
          <div class="sec-label">Dia ${dia.numero}</div>
          <div class="sec-titulo">${esc(dia.titulo||'')}</div>
          <div class="sec-num-bg">${String(dia.numero).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          ${dia.versiculo?`<div class="verse-box">
            <div class="verse-ref">${esc(dia.versiculo_ref||'')}</div>
            <div class="verse-text">${esc(dia.versiculo)}</div>
          </div>`:''}
          <div class="texto">${paras(dia.reflexao||'')}</div>
          ${(dia.perguntas||[]).length?`
            <div class="kp-label">Para Pensar Hoje</div>
            <ul class="kp-list">${(dia.perguntas||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
          `:''}
          ${dia.oracao?`<div class="prayer-box">
            <div class="prayer-label">🙏 Oração do Dia</div>
            <div class="prayer-text">${esc(dia.oracao)}</div>
          </div>`:''}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.oracao_final) {
      html += `<div class="page intro-page">
        ${pgHeader('Oração Final')}
        <div class="intro-label">Encerrando a Jornada</div>
        <div class="prayer-box" style="margin-top:6mm">
          <div class="prayer-label">🙏 Oração de Encerramento</div>
          <div class="prayer-text">${esc(d.oracao_final)}</div>
        </div>
        ${footer()}
      </div>`;
    }

  // ── SCRIPT VSL ──
  } else if (d.tipo === 'script_vsl') {
    const partes = d.partes||[];
    const durTotal = partes.reduce((s,p)=>s+(p.duracao_seg||0),0);
    const durMin = Math.floor(durTotal/60);
    const durSeg = durTotal%60;
    // Intro page: estrutura geral do script
    html += `<div class="page intro-page">
      ${pgHeader('Script VSL')}
      <div class="intro-label">Script de Vendas em Vídeo</div>
      <div class="intro-titulo">${esc(d.titulo)}</div>
      <div class="tip" style="margin-bottom:6mm">
        <div class="tip-icon">🎬</div>
        <div class="tip-text">Apresentador: <strong>${esc(d.autor)}</strong> &nbsp;·&nbsp; Duração estimada: <strong>${durMin}min ${String(durSeg).padStart(2,'0')}s</strong></div>
      </div>
      <div class="kp-label" style="margin-bottom:3mm">Estrutura do Script</div>
      ${partes.map((p,i)=>`
        <div style="display:flex;align-items:center;gap:3mm;padding:2.5mm 3mm;border-bottom:0.3mm solid #f0f0f7">
          <div style="width:6mm;height:6mm;border-radius:50%;background:var(--p);color:#fff;font-family:'Montserrat',sans-serif;font-size:7pt;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
          <div style="font-family:'Inter',sans-serif;font-size:10pt;font-weight:600;color:#141424;flex:1">${esc(p.nome||'')}</div>
          <div style="font-family:'Inter',sans-serif;font-size:8pt;color:var(--p);font-weight:500">~${p.duracao_seg||0}s</div>
        </div>
      `).join('')}
      ${footer()}
    </div>`;
    // 2 blocos por página para dar espaço de leitura
    for (let i = 0; i < partes.length; i += 2) {
      const grupo = partes.slice(i, i+2);
      html += `<div class="page intro-page" style="padding-top:10mm">
        ${pgHeader('Script VSL')}
        ${grupo.map(p=>`<div class="vsl-block">
          <div class="vsl-header">
            <div class="vsl-badge">${esc(p.nome||'')}</div>
            <div class="vsl-dur">~${p.duracao_seg||0}s</div>
          </div>
          <div class="vsl-script">${paras(p.script||'')}</div>
        </div>`).join('')}
        ${footer()}
      </div>`;
    }
  }

  /* ═══════════════ CONTRACAPA ═══════════════ */
  html += `<div class="page">
    <div class="contracapa">
      <div class="contracapa-top-bar"></div>
      <div class="contracapa-circle"></div>
      <div class="contracapa-titulo">${esc(d.titulo||'')}</div>
      <div class="contracapa-sub">${esc(d.subtitulo||d.nicho||'')}</div>
      <div class="contracapa-div"></div>
      <div class="contracapa-autor">${esc(d.autor)}</div>
      <div class="contracapa-tipo">${esc(d.label_tipo)} · ${d.ano}</div>
      <div class="contracapa-copy">© ${d.ano} ${esc(d.autor)} · Todos os direitos reservados</div>
    </div>
  </div>`;

  document.getElementById('doc').innerHTML = html;
})();
</script>
</body>
</html>
