<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
@page { size: A4; margin: 0; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
  background: #fff;
  width: 210mm;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* ── PÁGINA ── */
.page {
  width: 210mm;
  min-height: 297mm;
  position: relative;
  overflow: hidden;
  page-break-after: always;
  page-break-inside: avoid;
  background: #fff;
}
.page:last-child { page-break-after: auto; }

/* ── PÁGINA DE TRANSIÇÃO (entre capítulos/módulos/passos) ── */
.page-transition {
  width: 210mm;
  min-height: 297mm;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg,
    color-mix(in srgb, var(--p, #6366f1) 92%, #000) 0%,
    color-mix(in srgb, var(--p, #6366f1) 68%, #000) 100%
  );
  position: relative;
  overflow: hidden;
  page-break-after: always;
  page-break-inside: avoid;
}
.page-transition::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.55) 0.5px, transparent 0.5px);
  background-size: 9mm 9mm;
  opacity: 0.07;
}
.pt-num {
  font-family: 'Playfair Display', serif;
  font-size: 120pt;
  font-weight: 800;
  color: rgba(255,255,255,0.06);
  line-height: 1;
  position: absolute;
  right: 8mm;
  bottom: -10mm;
  user-select: none;
}
.pt-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7.5pt;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 5mm;
  position: relative;
  z-index: 2;
}
.pt-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 28pt;
  font-weight: 700;
  color: #fff;
  text-align: center;
  line-height: 1.2;
  max-width: 150mm;
  position: relative;
  z-index: 2;
}
.pt-line {
  width: 14mm; height: 1mm;
  background: rgba(255,255,255,0.3);
  border-radius: 1mm;
  margin: 6mm auto 0;
  position: relative;
  z-index: 2;
}

/* ── PÁGINA DE ÍNDICE ── */
.page-toc {
  width: 210mm;
  min-height: 297mm;
  position: relative;
  overflow: hidden;
  page-break-after: always;
  background: #fff;
}
.toc-header {
  padding: 12mm 16mm 8mm 20mm;
  border-bottom: 0.5mm solid color-mix(in srgb, var(--p, #6366f1) 15%, #eee);
  background: color-mix(in srgb, var(--p, #6366f1) 4%, #fff);
}
.toc-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 2mm;
}
.toc-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 22pt; font-weight: 700;
  color: #141424; line-height: 1.15;
}
.toc-body { padding: 7mm 16mm 14mm 20mm; }
.toc-entry {
  display: flex;
  align-items: baseline;
  gap: 0;
  padding: 3mm 0;
  border-bottom: 0.3mm solid #f0f0f8;
}
.toc-entry:last-child { border-bottom: none; }
.toc-num {
  font-family: 'Montserrat', sans-serif;
  font-size: 7.5pt; font-weight: 700;
  color: var(--p, #6366f1);
  min-width: 10mm; flex-shrink: 0;
}
.toc-name {
  font-family: 'Inter', sans-serif;
  font-size: 10pt; font-weight: 500;
  color: #1e1e2e; flex: 1;
  line-height: 1.4;
}
.toc-dots {
  flex: 1;
  border-bottom: 0.5mm dotted #ccc;
  margin: 0 3mm 1.5mm;
  min-width: 8mm;
}
.toc-pg {
  font-family: 'Montserrat', sans-serif;
  font-size: 8pt; font-weight: 600;
  color: color-mix(in srgb, var(--p, #6366f1) 60%, #aaa);
  min-width: 8mm; text-align: right; flex-shrink: 0;
}

/* ══════════════════════ CAPA ══════════════════════ */
.capa {
  width: 210mm;
  min-height: 297mm;
  position: relative;
  display: flex;
  flex-direction: column;
  background: var(--bg, #0f0e1f);
  overflow: hidden;
}

/* Fundo — gradiente radial que emana do topo */
.capa-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 130% 55% at 50% -5%,  color-mix(in srgb, var(--p) 60%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 80%  50% at 95% 95%,   color-mix(in srgb, var(--p) 22%, transparent) 0%, transparent 55%),
    linear-gradient(180deg, var(--bg, #0f0e1f) 0%, color-mix(in srgb, #000 55%, var(--bg)) 100%);
}

/* Grade de pontos sutil — textura de fundo */
.capa-lines {
  position: absolute;
  inset: 0;
  opacity: 0.10;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.6) 0.6px, transparent 0.6px);
  background-size: 9mm 9mm;
}

/* ── ZONA 1: TOPO ── badge do tipo de produto */
.capa-top {
  position: relative;
  z-index: 10;
  padding: 13mm 16mm 0;
  flex-shrink: 0;
}

.capa-badge {
  display: inline-flex;
  align-items: center;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 40px;
  padding: 2mm 5.5mm;
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.82);
}

/* ── ZONA 2: VISUAL — ícone com anéis concêntricos */
.capa-visual {
  flex: 1;
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 108mm;
  padding: 6mm 16mm;
}

.capa-ring-3 {
  width: 82mm; height: 82mm;
  border-radius: 50%;
  border: 0.35mm solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
}
.capa-ring-2 {
  width: 63mm; height: 63mm;
  border-radius: 50%;
  border: 0.45mm solid rgba(255,255,255,0.11);
  display: flex; align-items: center; justify-content: center;
}
.capa-ring-1 {
  width: 46mm; height: 46mm;
  border-radius: 50%;
  background: color-mix(in srgb, var(--p) 16%, transparent);
  border: 1mm solid color-mix(in srgb, var(--p) 42%, transparent);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18mm color-mix(in srgb, var(--p) 28%, transparent);
}
.capa-icon-main {
  font-size: 46pt;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.capa-icon-main svg { display: block; }

/* ── ZONA 3: CONTEÚDO — título, subtítulo, autor */
.capa-content {
  position: relative;
  z-index: 10;
  padding: 7mm 16mm 14mm;
  flex-shrink: 0;
  border-top: 0.3mm solid rgba(255,255,255,0.09);
}

.capa-line {
  width: 16mm; height: 1.2mm;
  background: linear-gradient(90deg, var(--s, #818cf8), transparent);
  border-radius: 1mm;
  margin-bottom: 5mm;
}

.capa-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 40pt;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -0.5px;
  margin-bottom: 4mm;
}

.capa-subtitulo {
  font-family: 'Inter', sans-serif;
  font-size: 10.5pt;
  font-weight: 300;
  color: rgba(255,255,255,0.62);
  line-height: 1.55;
  margin-bottom: 8mm;
  max-width: 160mm;
}

.capa-autor-row {
  display: flex;
  align-items: center;
  gap: 4mm;
}
.capa-autor-line {
  width: 6mm; height: 0.5mm;
  background: var(--s, #818cf8);
  border-radius: 1mm;
}
.capa-autor {
  font-family: 'Montserrat', sans-serif;
  font-size: 8.5pt;
  font-weight: 600;
  color: rgba(255,255,255,0.58);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* ══════════════════════ PÁGINA DE CONTEÚDO ══════════════════════ */

/* Barra de acento lateral — injetada pelo pgHeader em toda página de conteúdo */
.pg-acc-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3.5mm;
  background: linear-gradient(180deg,
    var(--p, #6366f1) 0%,
    color-mix(in srgb, var(--s, #818cf8) 70%, #000) 100%
  );
  opacity: 0.82;
}

/* Header de navegação da página */
.pg-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4mm 16mm 3.5mm 20mm;
  background: color-mix(in srgb, var(--p, #6366f1) 5%, #fff);
  border-bottom: 0.4mm solid color-mix(in srgb, var(--p, #6366f1) 14%, #fff);
  margin-bottom: 0;
}
.pg-header-titulo {
  font-family: 'Montserrat', sans-serif;
  font-size: 6.5pt;
  font-weight: 700;
  color: color-mix(in srgb, var(--p, #6366f1) 65%, #999);
  text-transform: uppercase;
  letter-spacing: 1.8px;
}
.pg-header-num {
  font-family: 'Inter', sans-serif;
  font-size: 7pt;
  font-weight: 500;
  color: color-mix(in srgb, var(--p, #6366f1) 50%, #bbb);
}

/* ── HEADER DE CAPÍTULO/MÓDULO/PASSO — banda colorida escura ── */
.sec-header {
  padding: 9mm 16mm 8mm 20mm;
  background: linear-gradient(
    125deg,
    color-mix(in srgb, var(--p, #6366f1) 88%, #000) 0%,
    color-mix(in srgb, var(--p, #6366f1) 65%, #000) 100%
  );
  border-bottom: none;
  margin-bottom: 7mm;
  position: relative;
  overflow: hidden;
}
/* Sombra interna no rodapé do header */
.sec-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3mm;
  background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.18));
}

.sec-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  color: rgba(255,255,255,0.58);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 2.5mm;
}
.sec-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 22pt;
  font-weight: 700;
  color: #fff;
  line-height: 1.18;
}
.sec-num-bg {
  position: absolute;
  right: 8mm; top: -3mm;
  font-family: 'Playfair Display', serif;
  font-size: 72pt;
  font-weight: 800;
  color: rgba(255,255,255,0.07);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

/* Corpo do texto */
.pg-body {
  padding: 0 16mm 18mm 20mm;
}

.texto {
  font-family: 'Inter', sans-serif;
  font-size: 10pt;
  color: #1e1e2e;
  line-height: 1.92;
  text-align: justify;
  margin-bottom: 5mm;
}
.texto p { margin-bottom: 3.5mm; }

/* ── PULL QUOTE ── */
.quote {
  margin: 6mm 0;
  padding: 5mm 8mm 5mm 14mm;
  border-left: 4mm solid var(--p, #6366f1);
  background: color-mix(in srgb, var(--p, #6366f1) 5%, #fafafa);
  border-radius: 0 3mm 3mm 0;
  position: relative;
}
.quote::before {
  content: '\201C';
  position: absolute;
  left: 2mm; top: -1mm;
  font-family: 'Playfair Display', serif;
  font-size: 28pt;
  color: var(--p, #6366f1);
  opacity: 0.45;
  line-height: 1;
}
.quote-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 12.5pt;
  font-style: italic;
  color: color-mix(in srgb, var(--p, #6366f1) 85%, #222);
  line-height: 1.62;
}

/* ── PONTOS-CHAVE — badges numerados ── */
.kp-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt;
  font-weight: 700;
  color: var(--p, #6366f1);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  margin: 5mm 0 3mm;
  display: flex;
  align-items: center;
  gap: 2mm;
}
.kp-label::before {
  content: '';
  display: inline-block;
  width: 8mm; height: 0.8mm;
  background: var(--p, #6366f1);
  border-radius: 1mm;
}
.kp-list { list-style: none; counter-reset: kp; }
.kp-list li {
  counter-increment: kp;
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt;
  color: #1e1e2e;
  padding: 2.5mm 0 2.5mm 9mm;
  line-height: 1.55;
  position: relative;
  border-bottom: 0.3mm solid #f0f0f8;
}
.kp-list li:last-child { border-bottom: none; }
.kp-list li::before {
  content: counter(kp);
  position: absolute;
  left: 0; top: 1.8mm;
  width: 5.5mm; height: 5.5mm;
  border-radius: 50%;
  background: var(--p, #6366f1);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 6.5pt;
  font-weight: 700;
  text-align: center;
  line-height: 5.5mm;
}

/* ── BOX DE DICA ── */
.tip {
  display: flex;
  gap: 4mm;
  margin: 5mm 0;
  padding: 5mm 6mm;
  background: color-mix(in srgb, var(--s, #818cf8) 6%, #fafafa);
  border-left: 3.5mm solid var(--s, #818cf8);
  border-radius: 0 3mm 3mm 0;
  border: 0.3mm solid color-mix(in srgb, var(--s, #818cf8) 18%, #f0f0f8);
  border-left-width: 3.5mm;
}
.tip-icon { font-size: 14pt; flex-shrink: 0; line-height: 1.4; margin-top: 0.3mm; }
.tip-text {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt;
  color: #2a2a3a;
  line-height: 1.68;
}

/* ── AÇÕES (GUIA) ── */
.actions { list-style: none; margin: 3.5mm 0; }
.actions li {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt;
  color: #1e1e2e;
  padding: 2.5mm 0 2.5mm 7mm;
  position: relative;
  line-height: 1.52;
  border-bottom: 0.3mm solid #f0f0f8;
}
.actions li:last-child { border-bottom: none; }
.actions li::before {
  content: '→';
  position: absolute; left: 0;
  color: var(--p, #6366f1);
  font-weight: 700; font-size: 9pt;
}

/* ── CHECKLIST ── */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 3.5mm;
  padding: 3mm 0;
  border-bottom: 0.3mm solid #f0f0f8;
}
.check-item:last-child { border-bottom: none; }
.check-box {
  width: 5mm; height: 5mm;
  border: 1mm solid var(--p, #6366f1);
  border-radius: 1.2mm;
  flex-shrink: 0;
  margin-top: 0.8mm;
  background: color-mix(in srgb, var(--p, #6366f1) 4%, #fff);
}
.check-text {
  font-family: 'Inter', sans-serif;
  font-size: 10pt;
  color: #1e1e2e;
  line-height: 1.58;
}

/* ── CHECKLIST: header de seção ── */
.cl-sec-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3.5mm 5mm 3.5mm 6mm;
  background: linear-gradient(90deg,
    color-mix(in srgb, var(--p, #6366f1) 10%, #fff),
    color-mix(in srgb, var(--p, #6366f1) 4%, #fff)
  );
  border-left: 4mm solid var(--p, #6366f1);
  border-radius: 0 2.5mm 2.5mm 0;
  margin-bottom: 2.5mm;
}
.cl-sec-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 10.5pt; font-weight: 700;
  color: color-mix(in srgb, var(--p, #6366f1) 85%, #111);
}
.cl-sec-count {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700; color: var(--p, #6366f1);
  background: color-mix(in srgb, var(--p, #6366f1) 10%, #fff);
  padding: 1.2mm 3mm; border-radius: 10mm; white-space: nowrap;
}
.cl-desc {
  font-family: 'Inter', sans-serif; font-size: 8.5pt;
  color: color-mix(in srgb, var(--p, #6366f1) 40%, #888);
  margin-bottom: 2.5mm; line-height: 1.5; font-style: italic;
}
.cl-section-wrap { margin-bottom: 5.5mm; }
.cl-section-wrap:last-child { margin-bottom: 0; }

/* ── WORKBOOK: bloco de exercício ── */
.wb-ex-block {
  margin: 4.5mm 0;
  padding: 5mm 6mm;
  background: #f8f8fe;
  border: 0.4mm solid color-mix(in srgb, var(--p, #6366f1) 14%, #e8e8f4);
  border-top: 2mm solid var(--p, #6366f1);
  border-radius: 0 0 2.5mm 2.5mm;
  page-break-inside: avoid;
}
.wb-ex-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 9pt; font-weight: 700;
  color: var(--p, #6366f1); margin-bottom: 2mm;
  display: flex; align-items: center; gap: 2mm;
}
.wb-ex-title::before {
  content: '';
  display: inline-block; width: 2.5mm; height: 2.5mm;
  background: var(--p, #6366f1); border-radius: 50%; flex-shrink: 0;
}
.wb-ex-instrucao {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt; color: #2e2e3e; line-height: 1.68;
  margin-bottom: 3.5mm;
}
.wb-ex-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 6.5pt; font-weight: 700;
  color: color-mix(in srgb, var(--p, #6366f1) 55%, #bbb);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 1.5mm;
}

/* Linhas de exercício */
.ex-line {
  border-bottom: 0.5mm solid #d8d8ee;
  height: 8mm;
  margin-bottom: 1mm;
}

/* ── VERSÍCULO (DEVOCIONAL) ── */
.verse-box {
  margin: 4mm 0 6mm;
  padding: 6mm 8mm;
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--p, #6366f1) 7%, #fff),
    color-mix(in srgb, var(--s, #818cf8) 5%, #fff)
  );
  border-left: 4mm solid var(--p, #6366f1);
  border-radius: 0 3mm 3mm 0;
  position: relative;
}
.verse-ref {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 2.5mm;
}
.verse-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 11.5pt; font-style: italic;
  color: color-mix(in srgb, var(--p, #6366f1) 90%, #111); line-height: 1.72;
}

/* ── ORAÇÃO (DEVOCIONAL) ── */
.prayer-box {
  margin: 4.5mm 0;
  padding: 5.5mm 7mm;
  background: color-mix(in srgb, var(--p, #6366f1) 5%, #f8f8fe);
  border: 0.4mm solid color-mix(in srgb, var(--p, #6366f1) 18%, #e8e8f4);
  border-radius: 2.5mm;
  position: relative;
}
.prayer-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 1.2px;
  text-transform: uppercase; margin-bottom: 3mm;
}
.prayer-text {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt; font-style: italic;
  color: #2a2a3e; line-height: 1.88;
}

/* ── DIA (DESAFIO) ── */
.day-card {
  padding: 3.5mm 5mm 3.5mm 5mm;
  border: 0.4mm solid #eaeaf8;
  border-left: 3.5mm solid color-mix(in srgb, var(--p, #6366f1) 70%, var(--s, #818cf8));
  border-radius: 0 2.5mm 2.5mm 0;
  margin-bottom: 3mm;
  background: color-mix(in srgb, var(--p, #6366f1) 2%, #fff);
  page-break-inside: avoid;
}
.day-num {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 1mm;
}
.day-title {
  font-family: 'Inter', sans-serif;
  font-size: 10pt; font-weight: 700;
  color: #141424; margin-bottom: 1.5mm;
}
.day-task {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt; color: #3a3a4a; line-height: 1.62;
}
.day-affirm {
  font-family: 'Playfair Display', serif;
  font-size: 8.5pt; font-style: italic;
  color: var(--p, #6366f1); margin-top: 2mm;
  opacity: 0.85;
}

/* ── PLANNER CAMPOS ── */
.pl-section-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 10.5pt; font-weight: 700;
  color: #141424;
  border-bottom: 1mm solid var(--p, #6366f1);
  padding-bottom: 2.5mm; margin-bottom: 5mm;
}
.pl-campo {
  display: flex;
  align-items: flex-start;
  gap: 3mm; margin-bottom: 4mm;
}
.pl-campo-label {
  font-family: 'Inter', sans-serif;
  font-size: 9pt; color: color-mix(in srgb, var(--p, #6366f1) 45%, #888);
  min-width: 40mm; padding-top: 0.5mm;
}
.pl-campo-line {
  flex: 1;
  border-bottom: 0.5mm solid #d0d0e8;
  min-height: 6.5mm;
}

/* ── VSL SCRIPT ── */
.vsl-block { margin-bottom: 5mm; }
.vsl-header { display: flex; align-items: center; gap: 3mm; margin-bottom: 2.5mm; }
.vsl-badge {
  background: var(--p, #6366f1); color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700; letter-spacing: 1.2px;
  padding: 1.5mm 3.5mm; border-radius: 1.5mm;
}
.vsl-dur {
  font-family: 'Inter', sans-serif; font-size: 8pt;
  color: color-mix(in srgb, var(--p, #6366f1) 40%, #aaa);
  font-weight: 500;
}
.vsl-script {
  font-family: 'Inter', sans-serif;
  font-size: 10pt; color: #1e1e2e; line-height: 1.88;
  text-align: justify;
  background: color-mix(in srgb, var(--p, #6366f1) 3%, #f8f8fc);
  padding: 4mm 6mm;
  border-radius: 2mm;
  border: 0.3mm solid color-mix(in srgb, var(--p, #6366f1) 10%, #eee);
}

/* ══════════════════════ RODAPÉ ══════════════════════ */
.pg-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 10mm;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16mm 0 20mm;
  background: color-mix(in srgb, var(--p, #6366f1) 4%, #fff);
  border-top: 0.4mm solid color-mix(in srgb, var(--p, #6366f1) 16%, #f0f0f0);
}
.footer-left {
  font-family: 'Montserrat', sans-serif;
  font-size: 6.5pt; font-weight: 700;
  color: color-mix(in srgb, var(--p, #6366f1) 55%, #bbb);
  letter-spacing: 1.2px; text-transform: uppercase;
}
.footer-right {
  font-family: 'Inter', sans-serif;
  font-size: 7pt;
  color: color-mix(in srgb, var(--p, #6366f1) 45%, #bbb);
  font-weight: 500;
}

/* ══════════════════════ INTRO PAGE ══════════════════════ */
.intro-page {
  padding: 0 16mm 14mm 20mm;
  display: flex;
  flex-direction: column;
}
.intro-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 7pt; font-weight: 700;
  color: var(--p, #6366f1); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 3mm;
}
.intro-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 22pt; font-weight: 700;
  color: #141424; line-height: 1.2;
  margin-bottom: 6mm;
}
.intro-texto {
  font-family: 'Inter', sans-serif;
  font-size: 10pt; color: #3a3a4a;
  line-height: 1.88; text-align: justify;
}
.intro-texto p { margin-bottom: 3mm; }

/* ══════════════════════ CONTRACAPA ══════════════════════ */
.contracapa {
  width: 210mm;
  min-height: 297mm;
  background: #0a0a18;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16mm;
  position: relative;
}
.contracapa-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3mm;
  background: linear-gradient(90deg, var(--p, #6366f1), var(--s, #818cf8), #22d3a5);
}
.contracapa-circle {
  position: absolute;
  bottom: -30mm; right: -20mm;
  width: 100mm; height: 100mm;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in srgb, var(--p, #6366f1) 20%, transparent), transparent 70%);
}
.contracapa-titulo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 22pt; font-weight: 700;
  color: #fff; text-align: center;
  margin-bottom: 5mm; line-height: 1.3;
  position: relative;
}
.contracapa-sub {
  font-family: 'Inter', sans-serif;
  font-size: 10.5pt; font-weight: 300;
  color: rgba(255,255,255,0.55);
  text-align: center; line-height: 1.7;
  max-width: 150mm; margin-bottom: 10mm;
  position: relative;
}
.contracapa-div {
  width: 18mm; height: 0.8mm;
  background: var(--p, #6366f1);
  margin: 0 auto 10mm;
  border-radius: 1mm;
  position: relative;
}
.contracapa-autor {
  font-family: 'Montserrat', sans-serif;
  font-size: 11pt; font-weight: 700;
  color: #fff; text-align: center;
  margin-bottom: 3mm;
  position: relative;
}
.contracapa-tipo {
  font-family: 'Inter', sans-serif;
  font-size: 9pt; color: rgba(255,255,255,0.35);
  text-align: center;
  position: relative;
}
.contracapa-copy {
  position: absolute;
  bottom: 7mm; left: 0; right: 0;
  font-family: 'Inter', sans-serif;
  font-size: 7.5pt; color: rgba(255,255,255,0.2);
  text-align: center;
}

/* ══════════════════════ CALLOUT BOXES ══════════════════════ */
.cbox {
  margin: 5mm 0;
  padding: 4mm 5.5mm;
  border-radius: 2.5mm;
  page-break-inside: avoid;
}
.cbox-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 6.5pt; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 2mm;
  display: flex; align-items: center; gap: 2mm;
}
.cbox-label::before {
  content: '';
  display: inline-block;
  width: 1.5mm; height: 4mm;
  border-radius: 1mm;
  background: currentColor;
  flex-shrink: 0;
}
.cbox-body {
  font-family: 'Inter', sans-serif;
  font-size: 9.5pt; line-height: 1.7;
}

/* Dica — âmbar */
.cbox-dica {
  background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
  border: 0.4mm solid #fcd34d;
  border-left: 3.5mm solid #f59e0b;
}
.cbox-dica .cbox-label { color: #92400e; }
.cbox-dica .cbox-body  { color: #451a03; }

/* Exemplo real — azul */
.cbox-exemplo {
  background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
  border: 0.4mm solid #93c5fd;
  border-left: 3.5mm solid #3b82f6;
}
.cbox-exemplo .cbox-label { color: #1e40af; }
.cbox-exemplo .cbox-body  { color: #1e3a5f; }

/* Na prática — verde */
.cbox-pratica {
  background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
  border: 0.4mm solid #86efac;
  border-left: 3.5mm solid #16a34a;
}
.cbox-pratica .cbox-label { color: #15803d; }
.cbox-pratica .cbox-body  { color: #14532d; font-weight: 600; }

/* Atenção — vermelho */
.cbox-atencao {
  background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
  border: 0.4mm solid #fca5a5;
  border-left: 3.5mm solid #ef4444;
}
.cbox-atencao .cbox-label { color: #991b1b; }
.cbox-atencao .cbox-body  { color: #450a0a; }

/* Sabia? — cor do tema */
.cbox-sabia {
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--p,#6366f1) 5%, #fff),
    color-mix(in srgb, var(--s,#818cf8) 8%, #fff)
  );
  border: 0.4mm solid color-mix(in srgb, var(--p,#6366f1) 22%, #ddd);
  border-left: 3.5mm solid var(--p,#6366f1);
}
.cbox-sabia .cbox-label { color: color-mix(in srgb, var(--p,#6366f1) 80%, #000); }
.cbox-sabia .cbox-body  {
  font-family: 'Playfair Display', serif;
  font-size: 11pt; font-style: italic;
  color: color-mix(in srgb, var(--p,#6366f1) 85%, #111);
  line-height: 1.7;
}
</style>
</head>
<body>
<div id="doc"></div>

<script>
/* __CRIADOR_DATA__ */

(function(){
  const d = window.__D;
  if (!d) return;

  const P = d.cores.primaria;
  const S = d.cores.secundaria;
  const BG = d.cores.bg;

  document.documentElement.style.setProperty('--p', P);
  document.documentElement.style.setProperty('--s', S);
  document.documentElement.style.setProperty('--bg', BG);

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function paras(t){
    return String(t||'').split(/\n+/).filter(Boolean)
      .map(p=>`<p>${esc(p)}</p>`).join('');
  }

  // ── Callout boxes ──
  function boxDica(t)    { return t?`<div class="cbox cbox-dica"><div class="cbox-label">Dica do Autor</div><div class="cbox-body">${esc(t)}</div></div>`:''; }
  function boxExemplo(t) { return t?`<div class="cbox cbox-exemplo"><div class="cbox-label">Exemplo Real</div><div class="cbox-body">${esc(t)}</div></div>`:''; }
  function boxPratica(t) { return t?`<div class="cbox cbox-pratica"><div class="cbox-label">Na Pratica — Faca Agora</div><div class="cbox-body">${esc(t)}</div></div>`:''; }
  function boxAtencao(t) { return t?`<div class="cbox cbox-atencao"><div class="cbox-label">Atencao</div><div class="cbox-body">${esc(t)}</div></div>`:''; }
  function boxSabia(t)   { return t?`<div class="cbox cbox-sabia"><div class="cbox-label">Voce Sabia?</div><div class="cbox-body">${esc(t)}</div></div>`:''; }

  let pgNum = 0;
  function footer(){
    pgNum++;
    return `<div class="pg-footer">
      <span class="footer-left">${esc(d.autor)}</span>
      <span class="footer-right">${pgNum}</span>
    </div>`;
  }
  function pgHeader(label){
    return `<div class="pg-acc-bar"></div><div class="pg-header">
      <span class="pg-header-titulo">${esc(d.titulo||'')}</span>
      <span class="pg-header-num">${esc(label||'')}</span>
    </div>`;
  }

  let html = '';

  /* ═══════════════ CAPA ═══════════════ */

  // SVG inline por tipo — vetorial, sem dependência externa, sem pixelação em PDF
  const TIPO_SVGS = {
    ebook: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><rect x="8" y="4" width="26" height="34" rx="3" fill="rgba(255,255,255,0.18)"/><rect x="12" y="4" width="26" height="34" rx="3" fill="rgba(255,255,255,0.28)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><line x1="18" y1="14" x2="32" y2="14" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/><line x1="18" y1="19" x2="32" y2="19" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/><line x1="18" y1="24" x2="27" y2="24" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></svg>`,
    workbook: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><rect x="8" y="6" width="32" height="36" rx="3" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/><line x1="16" y1="6" x2="16" y2="42" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/><line x1="20" y1="16" x2="34" y2="16" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="22" x2="34" y2="22" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="34" y2="28" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="34" x2="28" y2="34" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/></svg>`,
    guia: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><circle cx="24" cy="20" r="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><line x1="24" y1="10" x2="24" y2="6" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/><line x1="30.5" y1="12" x2="33.5" y2="9" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/><line x1="34" y1="20" x2="38" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/><circle cx="24" cy="20" r="3" fill="rgba(255,255,255,0.8)"/><path d="M19 32 L24 44 L29 32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>`,
    checklist: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><rect x="8" y="8" width="32" height="32" rx="4" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/><polyline points="15,24 21,30 33,18" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`,
    script_vsl: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><rect x="6" y="10" width="36" height="24" rx="4" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/><polygon points="20,17 20,27 32,22" fill="rgba(255,255,255,0.75)"/><line x1="14" y1="40" x2="34" y2="40" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/><line x1="19" y1="37" x2="19" y2="40" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><line x1="29" y1="37" x2="29" y2="40" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></svg>`,
    devocional: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><path d="M24 8 L24 40" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/><path d="M12 18 L36 18" stroke="rgba(255,255,255,0.65)" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="10" r="3" fill="rgba(255,255,255,0.5)"/></svg>`,
    planner: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><rect x="8" y="12" width="32" height="28" rx="3" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/><line x1="8" y1="20" x2="40" y2="20" stroke="rgba(255,255,255,0.45)" stroke-width="1"/><line x1="17" y1="8" x2="17" y2="16" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/><line x1="31" y1="8" x2="31" y2="16" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/><rect x="14" y="25" width="6" height="5" rx="1" fill="rgba(255,255,255,0.5)"/><rect x="24" y="25" width="6" height="5" rx="1" fill="rgba(255,255,255,0.35)"/><rect x="14" y="33" width="6" height="5" rx="1" fill="rgba(255,255,255,0.35)"/></svg>`,
    desafio: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52"><polygon points="24,6 30,18 44,18 33,28 37,42 24,34 11,42 15,28 4,18 18,18" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linejoin="round"/></svg>`,
  };
  const capaIcon = TIPO_SVGS[d.tipo] || `<svg viewBox="0 0 48 48" width="48" height="48"><polygon points="24,8 28,20 40,20 31,27 34,40 24,33 14,40 17,27 8,20 20,20" fill="rgba(255,255,255,0.7)"/></svg>`;

  // Função para gerar página de transição (antes de cada capítulo/módulo/passo)
  function transicao(label, num, titulo) {
    return `<div class="page-transition">
      <div class="pt-num">${String(num).padStart(2,'0')}</div>
      <div class="pt-label">${esc(label)}</div>
      <div class="pt-titulo">${esc(titulo||'')}</div>
      <div class="pt-line"></div>
    </div>`;
  }

  // Função para gerar TOC (índice)
  function gerarTOC(itens) {
    // itens = [{num, titulo}]
    return `<div class="page-toc">
      <div class="pg-acc-bar"></div>
      <div class="toc-header">
        <div class="toc-label">Sumário</div>
        <div class="toc-titulo">${esc(d.titulo||'')}</div>
      </div>
      <div class="toc-body">
        ${itens.map((it,i)=>`
          <div class="toc-entry">
            <span class="toc-num">${String(it.num).padStart(2,'0')}</span>
            <span class="toc-name">${esc(it.titulo||'')}</span>
            <span class="toc-dots"></span>
            <span class="toc-pg">${i+3}</span>
          </div>
        `).join('')}
      </div>
      ${footer()}
    </div>`;
  }

  html += `<div class="page">
    <div class="capa">
      <div class="capa-bg"></div>
      <div class="capa-lines"></div>

      <div class="capa-top">
        <div class="capa-badge">${esc(d.label_tipo)}</div>
      </div>

      <div class="capa-visual">
        <div class="capa-ring-3">
          <div class="capa-ring-2">
            <div class="capa-ring-1">
              <div class="capa-icon-main">${capaIcon}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="capa-content">
        <div class="capa-line"></div>
        <div class="capa-titulo">${esc(d.titulo||'')}</div>
        <div class="capa-subtitulo">${esc(d.subtitulo||d.nicho||'')}</div>
        <div class="capa-autor-row">
          <div class="capa-autor-line"></div>
          <div class="capa-autor">por ${esc(d.autor)} · ${d.ano}</div>
        </div>
      </div>
    </div>
  </div>`;

  /* ═══════════════ POR TIPO ═══════════════ */

  // ── EBOOK ──
  if (d.tipo === 'ebook') {
    // TOC
    if ((d.capitulos||[]).length) {
      html += gerarTOC((d.capitulos||[]).map((c,i)=>({num: c.numero||i+1, titulo: c.titulo})));
    }
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Introdução')}
        <div class="intro-label">Introdução</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${footer()}
      </div>`;
    }
    (d.capitulos||[]).forEach((c,i)=>{
      // Página de transição antes de cada capítulo
      html += transicao('Capítulo', c.numero||i+1, c.titulo);
      html += `<div class="page">
        ${pgHeader('Capítulo '+(c.numero||i+1))}
        <div class="sec-header">
          <div class="sec-label">Capítulo ${c.numero||i+1}</div>
          <div class="sec-titulo">${esc(c.titulo||'')}</div>
          <div class="sec-num-bg">${String(c.numero||i+1).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          <div class="texto">${paras(c.conteudo||'')}</div>
          ${boxDica(c.dica)}
          ${boxExemplo(c.exemplo_real)}
          ${boxAtencao(c.atencao)}
          ${boxPratica(c.acao_pratica)}
          ${c.citacao?`<div class="quote"><div class="quote-text">"${esc(c.citacao)}"</div></div>`:''}
          ${(c.pontos_chave||[]).length?`
            <div class="kp-label">Pontos-chave</div>
            <ul class="kp-list">${(c.pontos_chave||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
          `:''}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.conclusao) {
      html += `<div class="page intro-page">
        ${pgHeader('Conclusão')}
        <div class="intro-label">Conclusão</div>
        <div class="intro-titulo">Próximos Passos</div>
        <div class="intro-texto">${paras(d.conclusao)}</div>
        ${d.cta?`<div class="tip" style="margin-top:7mm"><div class="tip-icon" style="font-size:11pt">→</div><div class="tip-text">${esc(d.cta)}</div></div>`:''}
        ${footer()}
      </div>`;
    }

  // ── WORKBOOK ──
  } else if (d.tipo === 'workbook') {
    // TOC
    if ((d.modulos||[]).length) {
      html += gerarTOC((d.modulos||[]).map((m,i)=>({num: m.numero||i+1, titulo: m.titulo})));
    }
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Como Usar')}
        <div class="intro-label">Como Usar Este Workbook</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${footer()}
      </div>`;
    }
    // Cada módulo: transição + teoria + exercícios
    (d.modulos||[]).forEach((m,i)=>{
      html += transicao('Módulo', m.numero||i+1, m.titulo);
      html += `<div class="page">
        ${pgHeader('Módulo '+(m.numero||i+1))}
        <div class="sec-header">
          <div class="sec-label">Módulo ${m.numero||i+1}</div>
          <div class="sec-titulo">${esc(m.titulo||'')}</div>
          <div class="sec-num-bg">${String(m.numero||i+1).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          ${m.objetivo?`<div class="tip" style="margin-bottom:4mm"><div class="tip-icon" style="font-size:11pt">◎</div><div class="tip-text"><strong>Ao final deste módulo você vai:</strong> ${esc(m.objetivo)}</div></div>`:''}
          ${m.teoria?`<div class="texto">${paras(m.teoria)}</div>`:''}
          ${boxDica(m.dica)}
          ${boxExemplo(m.exemplo_real)}
        </div>
        ${footer()}
      </div>`;
      if ((m.exercicios||[]).length) {
        html += `<div class="page">
          ${pgHeader('Módulo '+(m.numero||i+1)+' — Exercícios')}
          <div class="pg-body" style="padding-top:6mm">
            <div class="sec-label" style="margin-bottom:3mm">Módulo ${m.numero||i+1} · Pratique Agora</div>
            ${(m.exercicios||[]).map((ex,ei)=>`
              <div class="wb-ex-block">
                <div class="wb-ex-title">${esc(ex.titulo||`Exercício ${ei+1}`)}</div>
                <div class="wb-ex-instrucao">${esc(ex.instrucao||'')}</div>
                <div class="wb-ex-label">Minha Resposta</div>
                <div>${Array(ex.linhas||6).fill('<div class="ex-line"></div>').join('')}</div>
              </div>
            `).join('')}
          </div>
          ${footer()}
        </div>`;
      }
    });
    if (d.reflexao_final) {
      html += `<div class="page intro-page">
        ${pgHeader('Reflexão Final')}
        <div class="intro-label">Reflexão Final</div>
        <div class="intro-titulo">Meu Compromisso</div>
        <div class="intro-texto">${paras(d.reflexao_final)}</div>
        <div style="margin-top:8mm">
          <div class="wb-ex-label" style="margin-bottom:2mm">Meu Próximo Passo Concreto</div>
          ${Array(5).fill('<div class="ex-line"></div>').join('')}
        </div>
        ${footer()}
      </div>`;
    }

  // ── GUIA ──
  } else if (d.tipo === 'guia') {
    if ((d.passos||[]).length) {
      html += gerarTOC((d.passos||[]).map((p,i)=>({num: p.numero||i+1, titulo: p.titulo})));
    }
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Introdução')}
        <div class="intro-label">Introdução</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${footer()}
      </div>`;
    }
    (d.passos||[]).forEach((p,i)=>{
      html += transicao('Passo', p.numero||i+1, p.titulo);
      html += `<div class="page">
        ${pgHeader('Passo '+(p.numero||i+1))}
        <div class="sec-header">
          <div class="sec-label">Passo ${p.numero||i+1}</div>
          <div class="sec-titulo">${esc(p.titulo||'')}</div>
          <div class="sec-num-bg">${String(p.numero||i+1).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          <div class="texto">${paras(p.descricao||'')}</div>
          ${(p.acoes||[]).length?`
            <div class="kp-label">Ações Práticas</div>
            <ul class="actions">${(p.acoes||[]).map(a=>`<li>${esc(a)}</li>`).join('')}</ul>
          `:''}
          ${boxDica(p.dica)}
          ${boxExemplo(p.exemplo_real)}
          ${boxPratica(p.acao_pratica)}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.conclusao) {
      html += `<div class="page intro-page">
        ${pgHeader('Próximos Passos')}
        <div class="intro-label">Finalizando</div>
        <div class="intro-titulo">Você Está Pronto</div>
        <div class="intro-texto">${paras(d.conclusao)}</div>
        ${footer()}
      </div>`;
    }

  // ── CHECKLIST ──
  } else if (d.tipo === 'checklist') {
    // Intro page
    if (d.introducao) {
      const totalItens = (d.secoes||[]).reduce((s,sec)=>s+(sec.itens||[]).length, 0);
      html += `<div class="page intro-page">
        ${pgHeader('Sobre')}
        <div class="intro-label">Sobre Este Checklist</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        <div class="tip" style="margin-top:7mm">
          <div class="tip-icon">✅</div>
          <div class="tip-text">
            <strong>${(d.secoes||[]).length} seções</strong> · <strong>${totalItens} itens verificáveis</strong>
            ${d.subtitulo ? ` · ${esc(d.subtitulo)}` : ''}
          </div>
        </div>
        ${footer()}
      </div>`;
    }
    // Pack sections: group by density (≤14 itens por página)
    const grupos = [];
    let cur = [], curN = 0;
    (d.secoes||[]).forEach(sec=>{
      const n = (sec.itens||[]).length;
      if (curN + n > 14 && cur.length > 0) {
        grupos.push(cur); cur = [sec]; curN = n;
      } else {
        cur.push(sec); curN += n;
      }
    });
    if (cur.length) grupos.push(cur);

    grupos.forEach(grupo=>{
      html += `<div class="page">
        ${pgHeader('Checklist')}
        <div class="pg-body" style="padding-top:4mm">
          ${grupo.map(sec=>`
            <div class="cl-section-wrap">
              <div class="cl-sec-hdr">
                <div class="cl-sec-title">${esc(sec.titulo||'')}</div>
                <div class="cl-sec-count">${(sec.itens||[]).length} itens</div>
              </div>
              ${sec.descricao?`<div class="cl-desc">${esc(sec.descricao)}</div>`:''}
              ${(sec.itens||[]).map(item=>`
                <div class="check-item">
                  <div class="check-box"></div>
                  <div class="check-text">${esc(item)}</div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.dica_final) {
      html += `<div class="page intro-page">
        ${pgHeader('Dica Final')}
        <div class="intro-label">Dica Final</div>
        <div class="intro-titulo">Como Tirar o Máximo</div>
        <div class="intro-texto">${paras(d.dica_final)}</div>
        ${footer()}
      </div>`;
    }

  // ── DESAFIO ──
  } else if (d.tipo === 'desafio') {
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Aceite o Desafio')}
        <div class="intro-label">Aceite o Desafio</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${d.manifesto?`<div class="quote" style="margin-top:6mm"><div class="quote-text">${esc(d.manifesto)}</div></div>`:''}
        ${footer()}
      </div>`;
    }
    (d.semanas||[]).forEach(sem=>{
      html += `<div class="page">
        ${pgHeader('Semana '+sem.numero)}
        <div class="sec-header">
          <div class="sec-label">Semana ${sem.numero}</div>
          <div class="sec-titulo">${esc(sem.tema||'')}</div>
          <div class="sec-num-bg">${sem.numero}</div>
        </div>
        <div class="pg-body">
          ${sem.descricao?`<div class="texto" style="margin-bottom:4mm">${paras(sem.descricao)}</div>`:''}
          ${(sem.dias||[]).map(dia=>`
            <div class="day-card">
              <div class="day-num">Dia ${dia.numero}</div>
              <div class="day-title">${esc(dia.titulo||'')}</div>
              <div class="day-task">${esc(dia.tarefa||'')}</div>
              <div class="day-affirm">✨ ${esc(dia.afirmacao||'')}</div>
            </div>
          `).join('')}
        </div>
        ${footer()}
      </div>`;
    });

  // ── PLANNER ──
  } else if (d.tipo === 'planner') {
    if (d.introducao) {
      html += `<div class="page intro-page">
        ${pgHeader('Como Usar')}
        <div class="intro-label">Como Usar Este Planner</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.introducao)}</div>
        ${d.citacao?`<div class="quote" style="margin-top:6mm"><div class="quote-text">"${esc(d.citacao)}"</div></div>`:''}
        ${footer()}
      </div>`;
    }
    (d.secoes||[]).forEach(sec=>{
      html += `<div class="page intro-page" style="padding-top:12mm">
        ${pgHeader('Planner')}
        <div class="pl-section-title">${esc(sec.titulo||'')}</div>
        ${sec.descricao?`<div class="tip-text" style="margin-bottom:4mm;font-size:9.5pt;color:#5a5a6a">${esc(sec.descricao)}</div>`:''}
        ${(sec.campos||[]).map(c=>`<div class="pl-campo">
          <div class="pl-campo-label">${esc(c)}</div>
          <div class="pl-campo-line"></div>
        </div>`).join('')}
        ${Array(4).fill('<div class="pl-campo"><div class="pl-campo-label"></div><div class="pl-campo-line"></div></div>').join('')}
        ${footer()}
      </div>`;
    });
    if ((d.rituais||[]).length) {
      html += `<div class="page intro-page" style="padding-top:12mm">
        ${pgHeader('Rituais')}
        <div class="intro-label">Rituais de Alta Performance</div>
        <div class="intro-titulo">Rotinas que Transformam</div>
        ${(d.rituais||[]).map(r=>`
          <div style="margin-bottom:5mm;padding:4mm 6mm;background:color-mix(in srgb,var(--p) 4%,#fff);border-radius:2mm;border:0.5mm solid color-mix(in srgb,var(--p) 12%,#fff)">
            <div class="kp-label">${esc(r.tipo||r.titulo||'')}</div>
            <ul class="kp-list">${(r.passos||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
          </div>
        `).join('')}
        ${footer()}
      </div>`;
    }

  // ── DEVOCIONAL ──
  } else if (d.tipo === 'devocional') {
    if (d.prefacio) {
      html += `<div class="page intro-page">
        ${pgHeader('Prefácio')}
        <div class="intro-label">Prefácio</div>
        <div class="intro-titulo">${esc(d.titulo)}</div>
        <div class="intro-texto">${paras(d.prefacio)}</div>
        ${footer()}
      </div>`;
    }
    (d.dias||[]).forEach(dia=>{
      html += `<div class="page">
        ${pgHeader('Dia '+dia.numero)}
        <div class="sec-header">
          <div class="sec-label">Dia ${dia.numero}</div>
          <div class="sec-titulo">${esc(dia.titulo||'')}</div>
          <div class="sec-num-bg">${String(dia.numero).padStart(2,'0')}</div>
        </div>
        <div class="pg-body">
          ${dia.versiculo?`<div class="verse-box">
            <div class="verse-ref">${esc(dia.versiculo_ref||'')}</div>
            <div class="verse-text">${esc(dia.versiculo)}</div>
          </div>`:''}
          <div class="texto">${paras(dia.reflexao||'')}</div>
          ${(dia.perguntas||[]).length?`
            <div class="kp-label">Para Pensar Hoje</div>
            <ul class="kp-list">${(dia.perguntas||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
          `:''}
          ${dia.oracao?`<div class="prayer-box">
            <div class="prayer-label">🙏 Oração do Dia</div>
            <div class="prayer-text">${esc(dia.oracao)}</div>
          </div>`:''}
        </div>
        ${footer()}
      </div>`;
    });
    if (d.oracao_final) {
      html += `<div class="page intro-page">
        ${pgHeader('Oração Final')}
        <div class="intro-label">Encerrando a Jornada</div>
        <div class="prayer-box" style="margin-top:6mm">
          <div class="prayer-label">🙏 Oração de Encerramento</div>
          <div class="prayer-text">${esc(d.oracao_final)}</div>
        </div>
        ${footer()}
      </div>`;
    }

  // ── SCRIPT VSL ──
  } else if (d.tipo === 'script_vsl') {
    const partes = d.partes||[];
    const durTotal = partes.reduce((s,p)=>s+(p.duracao_seg||0),0);
    const durMin = Math.floor(durTotal/60);
    const durSeg = durTotal%60;
    // Intro page: estrutura geral do script
    html += `<div class="page intro-page">
      ${pgHeader('Script VSL')}
      <div class="intro-label">Script de Vendas em Vídeo</div>
      <div class="intro-titulo">${esc(d.titulo)}</div>
      <div class="tip" style="margin-bottom:6mm">
        <div class="tip-icon">🎬</div>
        <div class="tip-text">Apresentador: <strong>${esc(d.autor)}</strong> &nbsp;·&nbsp; Duração estimada: <strong>${durMin}min ${String(durSeg).padStart(2,'0')}s</strong></div>
      </div>
      <div class="kp-label" style="margin-bottom:3mm">Estrutura do Script</div>
      ${partes.map((p,i)=>`
        <div style="display:flex;align-items:center;gap:3mm;padding:2.5mm 3mm;border-bottom:0.3mm solid #f0f0f7">
          <div style="width:6mm;height:6mm;border-radius:50%;background:var(--p);color:#fff;font-family:'Montserrat',sans-serif;font-size:7pt;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
          <div style="font-family:'Inter',sans-serif;font-size:10pt;font-weight:600;color:#141424;flex:1">${esc(p.nome||'')}</div>
          <div style="font-family:'Inter',sans-serif;font-size:8pt;color:var(--p);font-weight:500">~${p.duracao_seg||0}s</div>
        </div>
      `).join('')}
      ${footer()}
    </div>`;
    // 2 blocos por página para dar espaço de leitura
    for (let i = 0; i < partes.length; i += 2) {
      const grupo = partes.slice(i, i+2);
      html += `<div class="page intro-page" style="padding-top:10mm">
        ${pgHeader('Script VSL')}
        ${grupo.map(p=>`<div class="vsl-block">
          <div class="vsl-header">
            <div class="vsl-badge">${esc(p.nome||'')}</div>
            <div class="vsl-dur">~${p.duracao_seg||0}s</div>
          </div>
          <div class="vsl-script">${paras(p.script||'')}</div>
        </div>`).join('')}
        ${footer()}
      </div>`;
    }
  }

  /* ═══════════════ CONTRACAPA ═══════════════ */
  html += `<div class="page">
    <div class="contracapa">
      <div class="contracapa-top-bar"></div>
      <div class="contracapa-circle"></div>
      <div class="contracapa-circle" style="left:-20mm;top:-20mm;right:auto;bottom:auto;width:70mm;height:70mm"></div>

      <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%">
        <!-- Ícone SVG na contracapa -->
        <div style="opacity:0.22;margin-bottom:8mm">${capaIcon}</div>

        <div class="contracapa-titulo">${esc(d.titulo||'')}</div>
        <div class="contracapa-sub">${esc(d.subtitulo||d.nicho||'')}</div>
        <div class="contracapa-div"></div>
        <div class="contracapa-autor">${esc(d.autor)}</div>
        <div class="contracapa-tipo">${esc(d.label_tipo)} · ${d.ano}</div>

        <!-- Frase de fechamento -->
        <div style="margin-top:14mm;padding:5mm 10mm;border:0.5mm solid rgba(255,255,255,0.14);border-radius:3mm;max-width:140mm;text-align:center">
          <div style="font-family:'Playfair Display',serif;font-size:10.5pt;font-style:italic;color:rgba(255,255,255,0.45);line-height:1.7">
            "O conhecimento só transforma quando colocado em prática."
          </div>
        </div>
      </div>

      <div class="contracapa-copy">© ${d.ano} ${esc(d.autor)} · Todos os direitos reservados</div>
    </div>
  </div>`;

  document.getElementById('doc').innerHTML = html;
})();
</script>
</body>
</html>
