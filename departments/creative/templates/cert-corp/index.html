<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --p: {{cor_primaria}}; --a: {{cor_acento}}; --light: color-mix(in srgb, var(--p) 6%, white); }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  @page { size: A4 landscape; margin: 0; }
  html { width: 297mm; height: 210mm; }

  body {
    width: 297mm; height: 210mm;
    background: #fff;
    overflow: hidden;
    position: relative;
    font-family: 'Inter', sans-serif;
    display: flex;
  }

  /* Left accent panel */
  .left-panel {
    width: 68px;
    height: 100%;
    background: var(--p);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .left-panel-text {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: 'Raleway', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  .left-accent-line {
    position: absolute;
    right: 0; top: 0;
    height: 100%; width: 4px;
    background: var(--a);
  }

  /* Main area: cert content + deco split */
  .right-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px 14px;
    border-bottom: 1px solid #F0F0F0;
  }
  .company-name {
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--p);
  }
  .cert-sub {
    font-family: 'Raleway', sans-serif;
    font-size: 7.5px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #BDBDBD;
    margin-top: 2px;
  }
  .accent-bar { width: 40px; height: 2.5px; background: var(--a); margin-top: 7px; }
  .carga-badge {
    background: var(--p);
    color: white;
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1px;
    padding: 8px 18px;
    border-radius: 6px;
    text-align: center;
  }
  .carga-label {
    font-size: 6px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--a);
    display: block;
    margin-bottom: 2px;
  }

  /* Content split */
  .split {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left: cert text */
  .cert-main {
    flex: 1.1;
    padding: 24px 28px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .cert-mid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0 20px;
    opacity: 0.5;
  }
  .cert-mid-line { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--p), transparent); }
  .cert-mid-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 10px;
    color: var(--p);
    letter-spacing: 1px;
    text-align: center;
  }

  .cert-main-watermark { display: none; }
  .apresenta {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    color: #BDBDBD;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .recipient-name {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    font-weight: 700;
    color: var(--p);
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }
  .h-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .h-div-line { width: 36px; height: 2px; background: var(--a); }
  .h-div-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--a); }

  .course-box {
    border-left: 3px solid var(--p);
    padding: 8px 14px;
    background: var(--light);
    border-radius: 0 5px 5px 0;
    max-width: 380px;
  }
  .course-title {
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #212121;
    margin-bottom: 4px;
  }
  .body-text {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    color: #757575;
    line-height: 1.6;
  }
  .date-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #F5F5F5;
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'Raleway', sans-serif;
    font-size: 8px;
    font-weight: 600;
    color: #757575;
    letter-spacing: 0.5px;
    margin-top: 10px;
  }
  .date-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--a); }

  /* Vertical divider */
  .v-divider {
    width: 1px;
    background: linear-gradient(180deg, transparent 5%, #E8E8E8 30%, #E8E8E8 70%, transparent 95%);
    flex-shrink: 0;
    margin: 16px 0;
  }

  /* Right: decorative zone */
  .cert-deco {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    padding: 28px 20px 20px;
    position: relative;
    background: #fff;
  }

  .seal-ring {
    position: relative;
    width: 110px;
    height: 110px;
    flex-shrink: 0;
  }

  .seal-initial {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: var(--p);
    opacity: 0.12;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    letter-spacing: -2px;
    user-select: none;
  }

  .deco-label {
    font-family: 'Raleway', sans-serif;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #BDBDBD;
    text-align: center;
  }
  .deco-value {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 900;
    color: var(--p);
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
  }

  /* Bottom signatures */
  .signatures {
    display: flex;
    gap: 40px;
    padding: 0 28px 16px;
    position: relative;
    z-index: 1;
  }
  .sig-item { display: flex; flex-direction: column; gap: 4px; }
  .sig-line { width: 130px; height: 1px; background: #BDBDBD; }
  .sig-line-accent { width: 28px; height: 2px; background: var(--a); }
  .sig-label {
    font-family: 'Raleway', sans-serif;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #9E9E9E;
  }

  .footer-row {
    padding: 0 28px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 7px;
    color: #D0D0D0;
    line-height: 1.5;
  }
</style>
</head>
<body>

<!-- Left panel -->
<div class="left-panel">
  <div class="left-panel-text">{{empresa}}</div>
  <div class="left-accent-line"></div>
</div>

<!-- Right content -->
<div class="right-content">

  <!-- Top bar -->
  <div class="top-bar">
    <div>
      <div class="company-name">{{empresa}}</div>
      <div class="cert-sub">{{subtitulo}}</div>
      <div class="accent-bar"></div>
    </div>
    <div class="carga-badge">
      <span class="carga-label">Carga Horária</span>
      {{carga_horaria}}
    </div>
  </div>

  <!-- Split: cert text + deco -->
  <div class="split">

    <!-- Cert main -->
    <div class="cert-main">
      <div class="cert-main-watermark" id="wm"></div>

      <!-- Top: certificate content -->
      <div>
        <div class="apresenta">Certificamos que</div>
        <div class="recipient-name">{{nome_aluno}}</div>
        <div class="h-divider">
          <div class="h-div-line"></div>
          <div class="h-div-dot"></div>
        </div>
        <div class="course-box">
          <div class="course-title">{{titulo}}</div>
          <div class="body-text">{{texto_corpo}}</div>
        </div>
        <div class="date-chip"><div class="date-dot"></div>{{data}}</div>
      </div>

      <!-- Mid: decorative separator -->
      <div class="cert-mid">
        <div class="cert-mid-line"></div>
        <div class="cert-mid-text">Emitido com autenticidade e validade oficial</div>
        <div class="cert-mid-line"></div>
      </div>

      <!-- Bottom: signatures -->
      <div>
        <div class="signatures" style="padding:0 0 0;">
          <div class="sig-item">
            <div class="sig-line"></div>
            <div class="sig-line-accent"></div>
            <div class="sig-label">{{label_ass1}}</div>
          </div>
          <div class="sig-item">
            <div class="sig-line"></div>
            <div class="sig-line-accent"></div>
            <div class="sig-label">{{label_ass2}}</div>
          </div>
        </div>
        <div class="footer-row" style="padding:6px 0 0;">{{rodape}}</div>
      </div>
    </div>

    <div class="v-divider"></div>

    <!-- Deco zone -->
    <div class="cert-deco">
      <div class="seal-ring">
        <svg viewBox="0 0 110 110" width="110" height="110">
          <circle cx="55" cy="55" r="50" fill="none" stroke="var(--p)" stroke-width="1.5" opacity="0.15"/>
          <circle cx="55" cy="55" r="42" fill="none" stroke="var(--a)" stroke-width="0.5" opacity="0.3"/>
          <circle cx="55" cy="55" r="34" fill="none" stroke="var(--p)" stroke-width="0.5" opacity="0.1"/>
          <!-- tick marks around the circle -->
          <g opacity="0.2" stroke="var(--p)" stroke-width="1">
            <line x1="55" y1="5" x2="55" y2="11" transform="rotate(0 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(30 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(60 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="11" transform="rotate(90 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(120 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(150 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="11" transform="rotate(180 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(210 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(240 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="11" transform="rotate(270 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(300 55 55)"/>
            <line x1="55" y1="5" x2="55" y2="9" transform="rotate(330 55 55)"/>
          </g>
        </svg>
        <div class="seal-initial" id="initials"></div>
      </div>
      <div>
        <div class="deco-label">Programa</div>
        <div class="deco-value" style="font-size:9px;margin-top:3px">{{subtitulo}}</div>
      </div>
      <div style="width:40px;height:1px;background:var(--a);opacity:0.5"></div>
      <div>
        <div class="deco-label">Instituição</div>
        <div class="deco-value" style="font-size:9px;margin-top:3px">{{empresa}}</div>
      </div>
    </div>

  </div>

</div>

<script>
const empresa = '{{empresa}}';
const initials = empresa.split(' ').slice(0,2).map(w=>w[0]).join('');
document.getElementById('initials').textContent = initials;
document.getElementById('wm').textContent = initials;
</script>

</body>
</html>
