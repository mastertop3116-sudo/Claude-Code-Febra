<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar · MAX Criador</title>
<style>
  :root{--bg:#0b0f17;--card:#141b26;--line:#222c3a;--txt:#e8eef6;--mut:#8a97aa;--ac:#f97316;--ac2:#fb923c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:radial-gradient(130% 90% at 50% -10%,#1a2536 0%,var(--bg) 60%);color:var(--txt);
    font-family:'Segoe UI',system-ui,Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px 30px;
    box-shadow:0 24px 60px rgba(0,0,0,.45)}
  .logo{font-size:13px;font-weight:800;letter-spacing:3px;color:var(--ac);text-transform:uppercase}
  h1{font-size:23px;margin:6px 0 4px}
  p.sub{color:var(--mut);font-size:13.5px;margin-bottom:22px}
  label{display:block;font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
  input{width:100%;background:#0d141e;border:1px solid var(--line);border-radius:10px;color:var(--txt);
    padding:12px 13px;font-size:15px;outline:none}
  input:focus{border-color:var(--ac)}
  button{width:100%;margin-top:22px;background:linear-gradient(100deg,var(--ac),var(--ac2));color:#1a1206;border:0;
    border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  .erro{margin-top:14px;background:#2a1416;border:1px solid #5c2730;color:#ff9aa2;border-radius:9px;padding:10px 12px;
    font-size:13px;display:none}
  .rodape{margin-top:18px;text-align:center;color:var(--mut);font-size:12px}
</style>
</head>
<body>
  <form class="card" id="f" autocomplete="on">
    <div class="logo">MAX</div>
    <h1>Criador</h1>
    <p class="sub">Entre com seu usuário e senha pra criar seus materiais.</p>
    <label for="login">Usuário</label>
    <input id="login" name="login" type="text" autocomplete="username" autofocus placeholder="seu usuário">
    <label for="senha">Senha</label>
    <input id="senha" name="senha" type="password" autocomplete="current-password" placeholder="sua senha">
    <button type="submit" id="btn">Entrar</button>
    <div class="erro" id="erro"></div>
    <div class="rodape">MAX Criador · acesso restrito</div>
  </form>
<script>
  const f=document.getElementById('f'), btn=document.getElementById('btn'), erro=document.getElementById('erro');
  const next=new URLSearchParams(location.search).get('next')||'/estudio';
  f.addEventListener('submit', async e=>{
    e.preventDefault(); erro.style.display='none'; btn.disabled=true; btn.textContent='Entrando...';
    try{
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({login:document.getElementById('login').value,senha:document.getElementById('senha').value})});
      const d=await r.json();
      if(r.ok&&d.ok){ location.href=next; }
      else { erro.textContent=d.error||'Usuário ou senha incorretos.'; erro.style.display='block'; }
    }catch(_){ erro.textContent='Erro de conexão. Tente de novo.'; erro.style.display='block'; }
    btn.disabled=false; btn.textContent='Entrar';
  });
</script>
</body>
</html>
