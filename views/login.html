<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar · MAX Criador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfaf7;--surface:#ffffff;--ink:#17161a;--ink-2:#56555c;--faint:#8d8c93;
    --line:rgba(20,18,24,.10);--accent:#e8590c;--accent-2:#ff7a2f;--accent-soft:#fdf0e7;
    --shadow:0 30px 70px -28px rgba(20,18,24,.30),0 8px 24px -16px rgba(20,18,24,.18);
    --ease:cubic-bezier(.22,1,.36,1);--ease-io:cubic-bezier(.7,0,.2,1)
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{min-height:100vh;background:radial-gradient(900px 520px at 50% -8%, #fff6ee 0%, transparent 60%),var(--bg);
    color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;letter-spacing:-.01em;
    display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;position:relative}
  ::selection{background:var(--accent);color:#fff}
  .serif{font-family:'Fraunces',Georgia,serif}
  .ms0{stop-color:#9a9aa2}.ms1{stop-color:#5a5a62}.ms2{stop-color:#26262b}

  /* M GRANDE flutuando atrás da caixa */
  .bigm{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
  .bigm svg{width:min(86vh,86vw);height:auto;opacity:.06;animation:floaty 9s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(-14px) scale(1) rotate(-.5deg)}50%{transform:translateY(16px) scale(1.025) rotate(.5deg)}}

  /* CARD */
  .card{position:relative;z-index:2;width:100%;max-width:412px;background:var(--surface);border:1px solid var(--line);
    border-radius:30px;padding:46px 42px 40px;box-shadow:var(--shadow);transition:opacity .45s var(--ease),transform .45s var(--ease)}
  .card.out{opacity:0;transform:translateY(10px) scale(.965)}
  .anim>*{opacity:0;transform:translateY(14px);animation:up .8s var(--ease) forwards}
  .anim>*:nth-child(1){animation-delay:.05s}.anim>*:nth-child(2){animation-delay:.12s}
  .anim>*:nth-child(3){animation-delay:.19s}.anim>*:nth-child(4){animation-delay:.26s}
  .anim>*:nth-child(5){animation-delay:.33s}
  @keyframes up{to{opacity:1;transform:none}}
  .mark{width:48px;height:48px;display:block;margin-bottom:18px}
  .wordmark{font-size:.72rem;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:var(--faint);padding-left:.34em}
  h1{font-family:'Fraunces';font-weight:400;font-size:2.7rem;letter-spacing:-.03em;line-height:1;margin:14px 0 8px}
  .sub{color:var(--ink-2);font-size:.96rem;margin-bottom:26px}
  label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:0 0 7px 2px}
  .field{margin-bottom:16px}
  input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:14px;color:var(--ink);
    padding:14px 15px;font-size:1.02rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  button{width:100%;margin-top:8px;background:var(--accent);color:#fff;border:0;border-radius:99px;padding:15px;
    font-size:1.02rem;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .2s var(--ease),filter .2s}
  button:hover{transform:translateY(-1px);filter:brightness(1.07)}button:active{transform:none}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .erro{margin-top:16px;font-size:.9rem;color:#c0392b;background:#fdecea;border:1px solid #f5c6c0;border-radius:12px;padding:11px 13px;display:none}
  .foot{margin-top:26px;text-align:center;color:var(--faint);font-size:.78rem}

  /* TAKEOVER — loader pós-login: o M cresce e cobre tudo */
  .takeover{position:fixed;inset:0;z-index:70;background:radial-gradient(900px 560px at 50% 42%, #fff6ee 0%, var(--bg) 65%);
    display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .45s var(--ease)}
  .takeover.show{opacity:1;visibility:visible}
  .takeover .m3d{width:min(46vh,66vw);height:min(46vh,66vw);transform:scale(.16);opacity:.3;perspective:2800px;
    transition:transform .8s var(--ease),opacity .5s var(--ease)}
  .takeover.grow .m3d{transform:scale(.32);opacity:1}
  .takeover .mrot{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:spin3d 3s linear infinite}
  .takeover .mrot svg{position:absolute;inset:0;width:100%;height:100%}
  @keyframes spin3d{from{transform:rotateX(-14deg) rotateY(0deg)}to{transform:rotateX(-14deg) rotateY(360deg)}}
</style>
</head>
<body>
  <div class="bigm"><svg viewBox="0 0 30 30" fill="none"><defs><linearGradient id="mgBig" x1="15" y1="2" x2="15" y2="28" gradientUnits="userSpaceOnUse"><stop class="ms0" offset="0"/><stop class="ms1" offset=".55"/><stop class="ms2" offset="1"/></linearGradient></defs><path d="M3 24V9L12 18L15 5L18 18L27 9V24" stroke="url(#mgBig)" stroke-width="2.6" stroke-linejoin="miter" stroke-linecap="square"/></svg></div>

  <form class="card anim" id="f" autocomplete="on">
    <svg class="mark" viewBox="0 0 30 30" fill="none"><defs><linearGradient id="mgL" x1="15" y1="2" x2="15" y2="28" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#7c7c85"/><stop offset=".55" stop-color="#47474e"/><stop offset="1" stop-color="#202024"/></linearGradient></defs><path d="M3 24V9L12 18L15 5L18 18L27 9V24" stroke="url(#mgL)" stroke-width="2.6" stroke-linejoin="miter" stroke-linecap="square"/></svg>
    <div class="wordmark">MAX Criador</div>
    <h1 class="serif">Bem-vindo.</h1>
    <div>
      <div class="sub">Entre pra criar seus materiais.</div>
      <div class="field"><label for="login">Usuário</label><input id="login" name="login" type="text" autocomplete="username" autofocus placeholder="seu usuário"></div>
      <div class="field"><label for="senha">Senha</label><input id="senha" name="senha" type="password" autocomplete="current-password" placeholder="sua senha"></div>
      <button type="submit" id="btn">Entrar</button>
      <div class="erro" id="erro"></div>
    </div>
    <div class="foot">Acesso restrito</div>
  </form>

  <div class="takeover" id="takeover"><div class="m3d"><div class="mrot" id="tk3d"></div></div></div>

<script>
  // monta o M 3D (camadas com profundidade que giram) na transição
  function buildM3D(host,n,step){
    if(!host)return;n=n||16;step=step||3;const path='M3 24V9L12 18L15 5L18 18L27 9V24',NS='http://www.w3.org/2000/svg';
    const lerp=(a,b,t)=>{a=parseInt(a,16);b=parseInt(b,16);const f=s=>[s>>16&255,s>>8&255,s&255],A=f(a),B=f(b);
      return '#'+[0,1,2].map(i=>Math.round(A[i]+(B[i]-A[i])*t).toString(16).padStart(2,'0')).join('');};
    for(let i=0;i<n;i++){const z=(i-(n-1)/2)*step,t=i/(n-1);
      const svg=document.createElementNS(NS,'svg');svg.setAttribute('viewBox','0 0 30 30');svg.setAttribute('fill','none');
      svg.style.transform='translateZ('+z+'px)';
      const p=document.createElementNS(NS,'path');p.setAttribute('d',path);p.setAttribute('stroke',lerp('22222a','f1f1f6',t));
      p.setAttribute('stroke-width','2.6');p.setAttribute('stroke-linejoin','bevel');p.setAttribute('stroke-linecap','butt');
      svg.appendChild(p);host.appendChild(svg);}
  }
  buildM3D(document.getElementById('tk3d'),13,2.5);
  const f=document.getElementById('f'),btn=document.getElementById('btn'),erro=document.getElementById('erro'),
        card=f,takeover=document.getElementById('takeover');
  const next=new URLSearchParams(location.search).get('next')||'/estudio';
  f.addEventListener('submit',async e=>{
    e.preventDefault();erro.style.display='none';btn.disabled=true;btn.textContent='Entrando…';
    try{
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({login:document.getElementById('login').value,senha:document.getElementById('senha').value})});
      const d=await r.json();
      if(r.ok&&d.ok){
        // o M cresce e cobre tudo enquanto o estúdio carrega
        takeover.classList.add('show'); card.classList.add('out');
        requestAnimationFrame(()=>requestAnimationFrame(()=>takeover.classList.add('grow')));
        setTimeout(()=>{location.href=next;}, 900);
      } else {
        erro.textContent=d.error||'Usuário ou senha incorretos.';erro.style.display='block';btn.disabled=false;btn.textContent='Entrar';
      }
    }catch(_){erro.textContent='Erro de conexão. Tente de novo.';erro.style.display='block';btn.disabled=false;btn.textContent='Entrar';}
  });
</script>
</body>
</html>
